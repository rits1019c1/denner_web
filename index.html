<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Denner Playground — Try Denner in Your Browser</title>
  <meta name="description" content="Dennerプログラミング言語をブラウザで試せるインタラクティブPlayground。インストール不要でDennerコードを実行できます。" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-base: #09090f;
      --bg-surface: #0f0f1a;
      --bg-card: rgba(255, 255, 255, 0.04);
      --bg-card-hover: rgba(255, 255, 255, 0.07);
      --border: rgba(255, 255, 255, 0.08);
      --border-accent: rgba(139, 92, 246, 0.4);
      --primary: #8b5cf6;
      --primary-glow: rgba(139, 92, 246, 0.35);
      --secondary: #6366f1;
      --accent: #a78bfa;
      --green: #34d399;
      --red: #f87171;
      --yellow: #fbbf24;
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-muted: #475569;
      --editor-bg: #0a0a14;
      --font-sans: 'Outfit', system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
      --radius: 12px;
      --radius-lg: 16px;
      --shadow-glow: 0 0 40px rgba(139, 92, 246, 0.15);
    }

    html,
    body {
      height: 100%;
    }

    body {
      font-family: var(--font-sans);
      background: var(--bg-base);
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      height: 100vh;
    }

    /* ───────── HEADER ───────── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 24px;
      height: 58px;
      background: rgba(9, 9, 15, 0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      z-index: 100;
    }

    .logo-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-img {
      width: 32px;
      height: 32px;
      object-fit: contain;
      filter: drop-shadow(0 0 8px var(--primary-glow));
    }

    .logo-text {
      font-size: 1.2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #a78bfa, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.02em;
    }

    .badge {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      padding: 2px 7px;
      border-radius: 20px;
      background: var(--primary-glow);
      border: 1px solid var(--border-accent);
      color: var(--accent);
      font-weight: 600;
    }

    nav {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-left: auto;
    }

    nav a {
      font-size: 0.85rem;
      font-weight: 500;
      padding: 6px 14px;
      border-radius: 8px;
      text-decoration: none;
      color: var(--text-secondary);
      transition: all 0.2s;
      border: 1px solid transparent;
    }

    nav a:hover {
      color: var(--text-primary);
      background: var(--bg-card-hover);
      border-color: var(--border);
    }

    nav a.active {
      color: var(--accent);
      background: rgba(139, 92, 246, 0.12);
      border-color: var(--border-accent);
    }

    .btn-install {
      margin-left: 8px;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 7px 16px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: #fff;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      box-shadow: 0 4px 15px rgba(139, 92, 246, 0.3);
    }

    .btn-install:hover {
      opacity: 0.88;
      transform: translateY(-1px);
    }

    /* ───────── TOOLBAR ───────── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: rgba(15, 15, 26, 0.9);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .toolbar-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    select#sampleSelect {
      font-family: var(--font-mono);
      font-size: 0.78rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-primary);
      padding: 5px 10px;
      border-radius: 7px;
      cursor: pointer;
      outline: none;
      transition: border-color 0.2s;
    }

    select#sampleSelect:hover {
      border-color: var(--border-accent);
    }

    option {
      background: #1a1a2e;
    }

    .divider {
      width: 1px;
      height: 20px;
      background: var(--border);
      margin: 0 4px;
    }

    .btn-run {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: var(--font-sans);
      font-size: 0.82rem;
      font-weight: 600;
      padding: 6px 18px;
      border-radius: 8px;
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      color: #fff;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 14px rgba(109, 40, 217, 0.35);
    }

    .btn-run:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(109, 40, 217, 0.45);
    }

    .btn-run:active {
      transform: translateY(0);
    }

    .btn-run.running {
      background: linear-gradient(135deg, #374151, #1f2937);
      box-shadow: none;
    }

    .btn-run svg {
      width: 13px;
      height: 13px;
    }

    .btn-clear {
      font-family: var(--font-sans);
      font-size: 0.78rem;
      font-weight: 500;
      padding: 6px 12px;
      border-radius: 7px;
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-clear:hover {
      color: var(--text-secondary);
      border-color: rgba(255, 255, 255, 0.15);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-muted);
      margin-left: auto;
      transition: background 0.3s;
    }

    .status-dot.ok {
      background: var(--green);
      box-shadow: 0 0 8px rgba(52, 211, 153, 0.5);
    }

    .status-dot.err {
      background: var(--red);
      box-shadow: 0 0 8px rgba(248, 113, 113, 0.5);
    }

    .status-dot.running {
      background: var(--yellow);
      box-shadow: 0 0 8px rgba(251, 191, 36, 0.5);
      animation: pulse 1s infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.4;
      }
    }

    /* ───────── MAIN LAYOUT ───────── */
    .workspace {
      display: flex;
      flex: 1;
      overflow: hidden;
      min-height: 0;
    }

    .editor-pane {
      flex: 1;
      position: relative;
      border-right: 1px solid var(--border);
      min-width: 0;
    }

    #monaco-editor {
      position: absolute;
      inset: 0;
    }

    .output-pane {
      width: 38%;
      min-width: 280px;
      display: flex;
      flex-direction: column;
      background: var(--editor-bg);
    }

    .output-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .output-title {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-muted);
    }

    .traffic-lights {
      display: flex;
      gap: 5px;
    }

    .tl {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    .tl-r {
      background: #ff5f57;
    }

    .tl-y {
      background: #ffbd2e;
    }

    .tl-g {
      background: #28c840;
    }

    #output {
      flex: 1;
      overflow-y: auto;
      padding: 14px 16px;
      font-family: var(--font-mono);
      font-size: 0.75rem;
      line-height: 1.7;
      color: var(--text-secondary);
    }

    #output:empty::before {
      content: '// Run your code to see output here...';
      color: var(--text-muted);
      font-style: italic;
    }

    .out-line {
      display: block;
    }

    .out-line.err {
      color: var(--red);
    }

    .out-line.info {
      color: var(--text-muted);
      font-style: italic;
    }

    .out-line.ok {
      color: var(--green);
    }

    /* ───────── SCROLLBAR ───────── */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    /* ───────── LOADING ───────── */
    #loading-overlay {
      position: fixed;
      inset: 0;
      background: var(--bg-base);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      z-index: 999;
      transition: opacity 0.4s;
    }

    #loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loader-logo {
      width: 56px;
      height: 56px;
      object-fit: contain;
      filter: drop-shadow(0 0 20px var(--primary-glow));
      animation: float 2s ease-in-out infinite;
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-8px);
      }
    }

    .loader-text {
      font-size: 0.8rem;
      color: var(--text-muted);
      font-weight: 500;
    }

    .loader-bar {
      width: 160px;
      height: 2px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    .loader-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
      border-radius: 2px;
      animation: load 1.2s ease-in-out infinite;
    }

    @keyframes load {
      0% {
        width: 0%;
        margin-left: 0;
      }

      50% {
        width: 80%;
        margin-left: 0;
      }

      100% {
        width: 0%;
        margin-left: 100%;
      }
    }

    /* ───────── RESPONSIVE ───────── */
    @media (max-width: 768px) {
      .workspace {
        flex-direction: column;
      }

      .editor-pane {
        flex: none;
        height: 55%;
        border-right: none;
        border-bottom: 1px solid var(--border);
      }

      .output-pane {
        width: 100%;
        flex: 1;
      }

      .badge {
        display: none;
      }
    }
  </style>
</head>

<body>

  <!-- Loading Overlay -->
  <div id="loading-overlay">
    <img class="loader-logo" src="logo.png" alt="Denner" onerror="this.style.display='none'" />
    <div class="loader-bar">
      <div class="loader-fill"></div>
    </div>
    <span class="loader-text">Loading Denner Engine...</span>
  </div>

  <!-- Header -->
  <header>
    <a class="logo-wrap" href="index.html">
      <img class="logo-img" src="logo.png" alt="Denner Logo" onerror="this.style.display='none'" />
      <span class="logo-text">Denner</span>
      <span class="badge">v1.7.1</span>
    </a>
    <nav>
      <a href="index.html" class="active">🎮 Playground</a>
      <a href="wiki.html">📚 Wiki</a>
      <a class="btn-install" href="https://github.com/rits1019c1/denner" target="_blank">GitHub ↗</a>
    </nav>
  </header>

  <!-- Toolbar -->
  <div class="toolbar">
    <span class="toolbar-label">Sample</span>
    <select id="sampleSelect" onchange="loadSample(this.value)">
      <option value="hello_world">Hello World</option>
      <option value="variables">Variables & Types</option>
      <option value="control_flow">Control Flow</option>
      <option value="loops">Loops</option>
      <option value="functions">Functions</option>
      <option value="recursion">Recursion</option>
      <option value="classes">Classes (OOP)</option>
      <option value="string_methods">String Methods</option>
      <option value="typing">Strict vs Weak Typing</option>
      <optgroup label="— GUI Games —">
        <option value="gui">🐍 Snake Game</option>
        <option value="gui_breakout">🧱 Breakout Game</option>
        <option value="gui_graphics">✨ Visual Demo</option>
      </optgroup>
      <option value="cli">CLI Interaction</option>
      <option value="custom">— Custom Code —</option>
    </select>
    <div class="divider"></div>
    <button class="btn-run" id="runBtn" onclick="runCode()">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M8 5v14l11-7z" />
      </svg>
      Run
    </button>
    <button class="btn-stop" id="stopBtn"
      style="background: var(--bg-card); border: 1px solid var(--border); color: #f87171; padding: 0 12px; height: 32px; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: all 0.2s ease;">
      <svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14">
        <rect x="6" y="6" width="12" height="12" rx="2" />
      </svg>
      Stop
    </button>
    <button class="btn-clear" onclick="clearOutput()">Clear</button>
    <div class="status-dot" id="statusDot"></div>
  </div>

  <!-- Workspace -->
  <div class="workspace">
    <div class="editor-pane">
      <div id="monaco-editor"></div>
    </div>
    <div class="output-pane">
      <div class="output-header" style="justify-content: space-between;">
        <div style="display: flex; gap: 8px; align-items: center;">
          <div class="traffic-lights">
            <div class="tl tl-r"></div>
            <div class="tl tl-y"></div>
            <div class="tl tl-g"></div>
          </div>
          <span class="output-title">Output</span>
        </div>
        <div class="view-toggles" style="display: flex; gap: 4px;">
          <button id="toggle-console" onclick="showConsole()"
            style="background: rgba(139,92,246,0.3); color: var(--text-primary); border: 1px solid var(--border); padding: 2px 8px; border-radius: 4px; font-size: 11px; cursor: pointer;">Console</button>
          <button id="toggle-canvas" onclick="showCanvas()"
            style="background: transparent; color: var(--text-muted); border: 1px solid var(--border); padding: 2px 8px; border-radius: 4px; font-size: 11px; cursor: pointer;">Canvas</button>
        </div>
      </div>
      <div id="output" style="display: block;"></div>
      <div id="canvas-container"
        style="display: none; background: #000; flex: 1; align-items: center; justify-content: center; overflow: hidden;">
        <canvas id="denner-canvas" width="800" height="600"
          style="max-width: 100%; max-height: 100%; object-fit: contain;"></canvas>
      </div>
    </div>
  </div>

  <script>
    function showConsole() {
      document.getElementById('output').style.display = 'block';
      document.getElementById('canvas-container').style.display = 'none';
      document.getElementById('toggle-console').style.background = 'rgba(139,92,246,0.3)';
      document.getElementById('toggle-console').style.color = 'var(--text-primary)';
      document.getElementById('toggle-canvas').style.background = 'transparent';
      document.getElementById('toggle-canvas').style.color = 'var(--text-muted)';
    }
    function showCanvas() {
      document.getElementById('output').style.display = 'none';
      document.getElementById('canvas-container').style.display = 'flex';
      document.getElementById('toggle-console').style.background = 'transparent';
      document.getElementById('toggle-console').style.color = 'var(--text-muted)';
      document.getElementById('toggle-canvas').style.background = 'rgba(139,92,246,0.3)';
      document.getElementById('toggle-canvas').style.color = 'var(--text-primary)';
    }
  </script>

  <!-- Monaco Loader -->
  <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>
  <!-- Denner Engine -->
  <script src="denner.bundle.js"></script>

  <script>
    // ─────────────────────────────────────────
    // SAMPLES
    // ─────────────────────────────────────────
    const SAMPLES = {
      hello_world: `// ============================================
// Hello World - Denner Programming Language
// ============================================

log.print("Hello, World!")
log.print("Welcome to Denner!")
`,
      variables: `// ============================================
// Variables & Types
// ============================================

// Numbers
x = 10
y = 3.14

// Strings
name = "Denner"

// Boolean
isActive = true

// String interpolation
log.print("x = {x}")
log.print("y = {y}")
log.print("name = {name}")
log.print("isActive = {isActive}")

// Arithmetic
sum = x + 5
product = x * y

log.print("sum = {sum}")
log.print("product = {product}")
`,
      control_flow: `// ============================================
// Control Flow
// ============================================

score = 85

if score > 80 {
    log.print("Score is greater than 80")
} else {
    log.print("Score is 80 or less")
}

i = 0
while i < 3 {
    log.print("while: i = {i}")
    i = i + 1
}

for j in 0..3 {
    log.print("for: j = {j}")
}
`,
      loops: `// ============================================
// Loops - Range and Collection iteration
// ============================================

log.print("Range Loop (0..5):")
for i in 0..5 {
    log.print("  Iteration {i}")
}

log.print("List Iteration:")
fruits = ["apple", "banana", "cherry"]
for fruit in fruits {
    log.print("  Fruit: {fruit}")
}

log.print("While Loop:")
count = 3
while count > 0 {
    log.print("  Countdown: {count}")
    count = count - 1
}

log.print("Done!")
`,
      functions: `// ============================================
// Functions
// ============================================

function add(a: num, b: num): num {
    return a + b
}

function greet(name: str): str {
    return "Hello, " + name
}

result = add(10, 20)
log.print("add(10, 20) = {result}")

message = greet("Denner")
log.print(message)
`,
      recursion: `// ============================================
// Recursion - Factorial and Fibonacci
// ============================================

function factorial(n: num): num {
    if n <= 1 {
        return 1
    }
    return n * factorial(n - 1)
}

function fib(n: num): num {
    if n <= 1 {
        return n
    }
    return fib(n - 1) + fib(n - 2)
}

log.print("Factorial of 5: {factorial(5)}")
log.print("Fibonacci (10th): {fib(10)}")

log.print("Recursive countdown:")
function countDown(n: num) {
    if n > 0 {
        log.print(n)
        countDown(n - 1)
    }
}
countDown(5)
`,
      typing: `// ============================================
// Hybrid Typing: Strict & Weak
// ============================================

// 1. Strict Typing (Locked to num)
x: num = 2
// x = "abc" // Error! Cannot assign str to strict num variable.
log.print("Strict x: {x}")

// 2. Weak Typing (Dynamic re-assignment)
y = 10
log.print("Weak y (num): {y}")
y = "Hello Denner" // OK! Weak variables can change type.
log.print("Weak y (str): {y}")

// 3. Type inference (IDE autocomplete)
s = "denner"
// Type "s." below to see string methods!
log.print(s.upper())
`,
      classes: `// ============================================
// Classes (Object-Oriented Programming)
// ============================================

class Counter {
    count: num

    function increment() {
        this.count = this.count + 1
    }
    
    function reset() {
        this.count = 0
    }
}

counter = Counter()
counter.increment()
counter.increment()
counter.increment()
log.print("Counter value: {counter.count}")

counter.reset()
log.print("After reset: {counter.count}")
`,
      string_methods: `// ============================================
// String Methods
// ============================================

s = "Hello, Denner World!"

log.print("Original: {s}")
log.print("Upper: {s.upper()}")
log.print("Lower: {s.lower()}")
log.print("Length: {s.length()}")

word = "Denner"
found = s.includes(word)
log.print("Includes Denner: {found}")

trimmed = "  spaces  ".trim()
log.print("Trimmed: '{trimmed}'")

replaced = s.replace(word, "World")
log.print("Replaced: {replaced}")
`,
      gui: `// GUI: Snake Game 🐍
// Arrow keys to move! Eat red food!

import "gui"

class SnakeGame
{
    function constructor()
    {
        this.init()
    }

    function init()
    {
        this.body = [
            {x: 10, y: 10}, 
            {x: 9, y: 10}, 
            {x: 8, y: 10}
        ]
        this.dx = 1
        this.dy = 0
        this.fx = 15
        this.fy = 15
        this.score = 0
        this.timer = 0
        this.speed = 8
        this.gameOver = false
    }

    function draw()
    {
        if this.gameOver
        {
            gui.clear("#1a1a3e")
            gui.textCenter("GAME OVER", 400, 250, "#ff4b2b", 60)
            gui.textCenter("SCORE: " + this.score, 400, 320, "white", 30)
            gui.textCenter("Press SPACE to Restart", 400, 450, "#00d2ff", 20)
            
            if (gui.get_last_key() == "Space")
            {
                this.init()
            }
            return
        }

        if gui.isKeyPressed("ArrowLeft") and this.dx != 1
        {
            this.dx = -1
            this.dy = 0
        }
        if gui.isKeyPressed("ArrowRight") and this.dx != -1
        {
            this.dx = 1
            this.dy = 0
        }
        if gui.isKeyPressed("ArrowUp") and this.dy != 1
        {
            this.dx = 0
            this.dy = -1
        }
        if gui.isKeyPressed("ArrowDown") and this.dy != -1
        {
            this.dx = 0
            this.dy = 1
        }

        this.timer = this.timer + 1
        if this.timer >= this.speed
        {
            this.timer = 0

        }

        const classRe = /^\s*class\s+([a-zA-Z_]\w*)/gm;
        while ((m = classRe.exec(content)) !== null) {
          if (!visited.has(m[1])) { symbols.classes.push(m[1]); visited.add(m[1]); }
        }

        const SKIP = new Set(['function', 'return', 'if', 'else', 'while', 'for', 'in', 'import',
          'export', 'class', 'this', 'true', 'false', 'null', 'undefined',
          'num', 'str', 'bool', 'void', 'any', 'log', 'net', 'os', 'cli', 'path']);

        const lines = content.split('\n');

          line = line.trim();
          let match = line.match(/^([a-zA-Z_]\w*)\s*:\s*(str|num|bool|list)\s*(?:=|$)/);

              symbols.varTypes[name] = match[2];

            }
            continue;

          match = line.match(/^([a-zA-Z_]\w*)\s*=\s*(.*)$/);

              else if (/^-?\d/.test(val)) symbols.varTypes[name] = 'num';
              else if (val.includes('.rect(') || val.includes('.image(')) symbols.varTypes[name] = 'gui_object';

              if (!visited.has(name)) { symbols.vars.push(name); visited.add(name); }

              suggestions: [{
                label: `imp/${mod}/${alias}`,
                filterText: word.word || impMatch[0],
                kind: CK.Snippet,
                insertText: `import "${mod}" as ${alias || mod}`,
                range: replaceRange,
                detail: `Import ${mod}`
              }]
            };
          }

          const aliasMap = parseImportAliases(content);
          const symbols = parseDocumentSymbols(content);

          const dotMatch = beforeCursor.match(/([a-zA-Z_]\w*)\.\s*$/);
          if (dotMatch) {
            const obj = dotMatch[1];
            let modName = MODULE_DOCS[obj] ? obj : aliasMap[obj];

            const type = symbols.varTypes[obj];
            if (!modName && type) {
              if (type === 'str' || type === 'string') modName = 'string';
              else if (type === 'list') modName = 'list';
              else if (type === 'gui_object') modName = 'gui';
            }

            const methods = modName ? (MODULE_DOCS[modName] || null) : null;
            if (methods) {
              return {
                suggestions: Object.entries(methods).map(([name, info]) => ({
                  label: name,
                  kind: CK.Method,
                  detail: `${modName}.${info.sig}`,
                  documentation: { value: info.doc },
                  insertText: name,
                  range,
                }))
              };
            }
            return { suggestions: [] };
          }

          const importMatch = beforeCursor.match(/import\s+"([\w]*)$/);
          if (importMatch) {
            const mods = ['string', 'net', 'os', 'cli', 'path'];
            return {
              suggestions: mods.map(m => ({
                label: m,
                kind: CK.Module,
                detail: `import "${m}"`,
                documentation: { value: `**${m}** モジュールをインポートします。` },
                insertText: m + '"',
                range,
              }))
            };
          }

          const suggestions = [];

          const keywords = ['function', 'return', 'if', 'else', 'while', 'for', 'in', 'import', 'export', 'class', 'this', 'true', 'false', 'null', 'and', 'or', 'not'];
          keywords.forEach(kw => suggestions.push({
            label: kw, kind: CK.Keyword, insertText: kw, range,
          }));

          ['num', 'str', 'bool', 'void', 'any'].forEach(t => suggestions.push({
            label: t, kind: CK.TypeParameter, detail: 'type', insertText: t, range,
          }));

          Object.keys(MODULE_DOCS).forEach(mod => suggestions.push({
            label: mod,
            kind: CK.Module,
            detail: 'built-in module',
            documentation: { value: `**${mod}** 組み込みモジュール` },
            insertText: mod,
            range,
          }));

          Object.entries(aliasMap).forEach(([alias, modName]) => {
            if (!MODULE_DOCS[alias]) {
              suggestions.push({
                label: alias,
                kind: CK.Module,
                detail: `alias for "${modName}"`,
                documentation: { value: `\`import "${modName}" as ${alias}\` で定義されたエイリアス` },
                insertText: alias,
                range,
              });
            }
          });

          symbols.funcs.forEach(name => suggestions.push({
            label: name,
            kind: CK.Function,
            detail: 'function',
            documentation: { value: `**function** \`${name}\`` },
            insertText: name,
            range,
          }));
          symbols.classes.forEach(name => suggestions.push({
            label: name,
            kind: CK.Class,
            detail: 'class',
            documentation: { value: `**class** \`${name}\`` },
            insertText: name,
            range,
          }));
          symbols.vars.forEach(name => suggestions.push({
            label: name,
            kind: CK.Variable,
            detail: 'variable',
            insertText: name,
            range,
          }));

          const snippets = [
            {
              label: 'function', detail: 'function definition', doc: '関数を定義します。',
              insert: 'function ${1:name}(${2:param}: ${3:num}): ${4:void} {\n\t${0}\n}'
            },
            {
              label: 'if', detail: 'if statement', doc: 'if 条件分岐',
              insert: 'if ${1:condition} {\n\t${0}\n}'
            },
            {
              label: 'if-else', detail: 'if/else statement', doc: 'if-else 条件分岐',
              insert: 'if ${1:condition} {\n\t${2}\n} else {\n\t${0}\n}'
            },
            {
              label: 'for', detail: 'for range loop', doc: '範囲 for ループ',
              insert: 'for ${1:i} in ${2:0}..${3:10} {\n\t${0}\n}'
            },
            {
              label: 'for-in', detail: 'for-in loop', doc: 'コレクション for ループ',
              insert: 'for ${1:item} in ${2:list} {\n\t${0}\n}'
            },
            {
              label: 'while', detail: 'while loop', doc: 'while ループ',
              insert: 'while ${1:condition} {\n\t${0}\n}'
            },
            {
              label: 'class', detail: 'class definition', doc: 'クラスを定義します。',
              insert: 'class ${1:Name} {\n\t${2:field}: ${3:num}\n\n\tfunction ${4:method}() {\n\t\t${0}\n\t}\n}'
            },
            {
              label: 'import', detail: 'import statement', doc: 'モジュールをインポートします。',
              insert: 'import "${1:module}"'
            },
            {
              label: 'import-as', detail: 'import as alias', doc: 'エイリアス付きインポート。',
              insert: 'import "${1:module}" as ${2:alias}'
            },
            {
              label: 'log.print', detail: 'log.print(value)', doc: '値を出力します。',
              insert: 'log.print(${1:"message"})'
            },
            {
              label: 'impgui', detail: 'Import GUI module', doc: 'GUI モジュールをインポートします。',
              insert: 'import "gui" as gui'
            },
            {
              label: 'impnet', detail: 'Import Network module', doc: 'Network モジュールをインポートします。',
              insert: 'import "net" as net'
            },
            {
              label: 'impos', detail: 'Import OS module', doc: 'OS モジュールをインポートします。',
              insert: 'import "os" as os'
            },
            {
              label: 'impstring', detail: 'Import String module', doc: 'String モジュールをインポートします。',
              insert: 'import "string" as string'
            }
          ];
          snippets.forEach(s => suggestions.push({
            label: s.label, kind: CK.Snippet, detail: s.detail,
            documentation: { value: s.doc }, insertText: s.insert,
            insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet,
            range,
          }));

          return { suggestions };
        }
      });

      monaco.languages.registerHoverProvider('denner', {
        provideHover(model, position) {
          const word = model.getWordAtPosition(position);
          if (!word) return null;

          const content = model.getValue();
          const lineText = model.getLineContent(position.lineNumber);
          const beforeW = lineText.slice(0, word.startColumn - 1);
          const dotMatch = beforeW.match(/(\w+)\.\s*$/);
          const aliasMap = parseImportAliases(content);

          if (dotMatch) {
            const obj = dotMatch[1];
            const method = word.word;
            const modName = MODULE_DOCS[obj] ? obj : aliasMap[obj];
            const info = modName ? MODULE_DOCS[modName]?.[method] : null;
            if (info) {
              const dispObj = modName !== obj ? `${obj} (${modName})` : obj;
              return {
                contents: [
                  { value: '```denner\n' + dispObj + '.' + info.sig + '\n```' },
                  { value: info.doc },
                ]
              };
            }
          }

          if (aliasMap[word.word] && !MODULE_DOCS[word.word]) {
            const modName = aliasMap[word.word];
            const methods = Object.keys(MODULE_DOCS[modName] || {}).join(', ');
            return {
              contents: [
                { value: `**${word.word}** — \`${modName}\` のエイリアス` },
                { value: `使用可能なメソッド: \`${methods}\`` },
              ]
            };
          }

          if (MODULE_DOCS[word.word]) {
            const methods = Object.keys(MODULE_DOCS[word.word]).join(', ');
            return {
              contents: [
                { value: `**${word.word}** — 組み込みモジュール` },
                { value: `使用可能なメソッド: \`${methods}\`` },
              ]
            };
          }

          const keywordDocs = {
            function: '**function** — 関数を定義します。\n```denner\nfunction name(param: type): returnType { }\n```',
            class: '**class** — クラスを定義します。\n```denner\nclass Name { field: type }\n```',
            if: '**if** — 条件分岐。`if condition { } else { }`',
            while: '**while** — 条件が真の間繰り返します。`while condition { }`',
            for: '**for** — 範囲またはコレクションをイテレートします。',
            import: '**import** — モジュールをインポートします。\n`import "module"` または `import "module" as alias`',
            return: '**return** — 関数から値を返します。',
            this: '**this** — クラスのインスタンス自身を参照します。',
            true: '**true** — 真偽値（bool型）',
            false: '**false** — 真偽値（bool型）',
            num: '**num** — 数値型（整数・浮動小数点）',
            str: '**str** — 文字列型',
            bool: '**bool** — 真偽値型（true / false）',
            void: '**void** — 戻り値なし（関数の戻り値型として使用）',
            any: '**any** — 任意の型',
          };
          if (keywordDocs[word.word]) {
            return { contents: [{ value: keywordDocs[word.word] }] };
          }

          return null;
        }
      });

      monaco.languages.registerSignatureHelpProvider('denner', {
        signatureHelpTriggerCharacters: ['(', ','],
        signatureHelpRetriggerCharacters: [','],

        provideSignatureHelp(model, position) {
          const content = model.getValue();
          const lineText = model.getLineContent(position.lineNumber);
          const beforeCursor = lineText.slice(0, position.column - 1);
          const aliasMap = parseImportAliases(content);

          const callMatch = beforeCursor.match(/(\w+)(?:\.(\w+))?\s*\(([^)]*)$/);
          if (!callMatch) return null;

          const [, obj, method] = callMatch;
          const args = callMatch[3].split(',');
          const activeParam = args.length - 1;

          const modName = MODULE_DOCS[obj] ? obj : aliasMap[obj];
          let info = method && modName ? MODULE_DOCS[modName]?.[method] : null;
          if (!info) return null;

          const sigMatch = info.sig.match(/\(([^)]*)\)/);
          const paramStr = sigMatch ? sigMatch[1] : '';
          const params = paramStr ? paramStr.split(',').map(p => p.trim()) : [];

          return {
            value: {
              signatures: [{
                label: (method ? obj + '.' : '') + info.sig,
                documentation: { value: info.doc },
                parameters: params.map(p => ({ label: p })),
              }],
              activeSignature: 0,
              activeParameter: Math.min(activeParam, params.length - 1),
            },
            dispose: () => { },
          };
        }
      });

      editor = monaco.editor.create(document.getElementById('monaco-editor'), {
        value: SAMPLES.hello_world,
        language: 'denner',
        theme: 'denner-dark',
        fontSize: 14,
        fontFamily: "'JetBrains Mono', 'Fira Code', monospace",
        fontLigatures: true,
        lineHeight: 22,
        padding: { top: 16, bottom: 16 },
        minimap: { enabled: false },
        scrollBeyondLastLine: false,
        smoothScrolling: true,
        cursorBlinking: 'smooth',
        cursorSmoothCaretAnimation: 'on',
        renderLineHighlight: 'gutter',
        automaticLayout: true,
        suggestOnTriggerCharacters: true,
        quickSuggestions: { other: true, comments: false, strings: false },
        parameterHints: { enabled: true },
        wordBasedSuggestions: false,
        tabSize: 4,
        insertSpaces: true,
      });

      editor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.Enter, runCode);

      document.getElementById('runBtn').onclick = async () => {
        await runCode();
      };

      document.getElementById('stopBtn').onclick = () => {
        if (currentInterpreter) {
          currentInterpreter.guiRunning = false;
        }
      };

      setTimeout(() => {
        document.getElementById('loading-overlay').classList.add('hidden');
      }, 500);
    });

    function loadSample(key) {
      if (editor && SAMPLES[key]) {
        editor.setValue(SAMPLES[key]);
        clearOutput();
      }
    }

    function appendOutput(text, type = '') {
      const out = document.getElementById('output');
      const line = document.createElement('span');
      line.className = 'out-line' + (type ? ' ' + type : '');
      line.textContent = text;
      out.appendChild(line);
      out.scrollTop = out.scrollHeight;
    }

    function clearOutput() {
      document.getElementById('output').innerHTML = '';
    }

    let currentInterpreter = null;

    async function runCode() {
      if (!editor) return;
      const code = editor.getValue();
      const dot = document.getElementById('statusDot');
      const btn = document.getElementById('runBtn');

      clearOutput();
      dot.className = 'status-dot running';
      btn.classList.add('running');
      btn.innerHTML = `<svg viewBox="0 0 24 24" fill="currentColor" width="13" height="13"><rect x="6" y="6" width="12" height="12" rx="2"/></svg> Running`;

      // Buffer for partial lines
      let outputBuffer = '';
      const flushLine = (text) => {
        const lines = (outputBuffer + text).split('\n');
        for (let i = 0; i < lines.length - 1; i++) {
          if (lines[i] !== '') appendOutput(lines[i]);
        }
        outputBuffer = lines[lines.length - 1];
      };

      // Mock process.stdout.write so Interpreter's log.print works
      const origWrite = (typeof process !== 'undefined' && process.stdout)
        ? process.stdout.write.bind(process.stdout) : null;
      if (typeof process !== 'undefined' && process.stdout) {
        process.stdout.write = (str) => { flushLine(str); return true; };
      }
      // Also patch console.log as fallback
      const origLog = console.log;
      console.log = (...args) => {
        flushLine(args.map(a => a == null ? String(a) : String(a)).join(' ') + '\n');
      };

      try {
        const { Lexer, Parser, Interpreter, TypeChecker } = DennerBundle;

        const tokens = new Lexer(code).tokenize();
        const parser = new Parser(tokens);
        const ast = parser.parse();

        // Enforce Static Type Checking
        const typechecker = new TypeChecker(ast);
        typechecker.check();

        const interpreter = new Interpreter();

        // GUI Initialization logic
        const hasGui = /import\s+"gui"/.test(code);
        if (hasGui) {
          showCanvas();
          const canvas = document.getElementById('denner-canvas');
          const ctx = canvas.getContext('2d');
          const pressedKeys = new Set();
          interpreter.setGuiState({
            window: window,
            canvas: canvas,
            ctx: ctx,
            width: 800,
            height: 600,
            lastKey: '',
            physicsObjects: [],
            pressedKeys: pressedKeys,
          });

          const handleKeyDown = (e) => {
            pressedKeys.add(e.key);
            const map = { 'ArrowUp': 'Up', 'ArrowDown': 'Down', 'ArrowLeft': 'Left', 'ArrowRight': 'Right', ' ': 'Space' };
            if (interpreter.gui) interpreter.gui.lastKey = map[e.key] ?? e.key;
          };
          const handleKeyUp = (e) => {
            pressedKeys.delete(e.key);
            if (interpreter.gui) {
              if (pressedKeys.size === 0 || !['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown', ' '].includes(e.key)) {
                interpreter.gui.lastKey = '';
              }
            }
          };
          window.addEventListener('keydown', handleKeyDown);
          window.addEventListener('keyup', handleKeyUp);

          // Remove listeners when done (not perfect if loop never ends, but ok for playground)
          interpreter._cleanupGui = () => {
            window.removeEventListener('keydown', handleKeyDown);
            window.removeEventListener('keyup', handleKeyUp);
          };
        }

        await interpreter.run(ast);

        if (interpreter._cleanupGui) interpreter._cleanupGui();

        if (outputBuffer.trim()) appendOutput(outputBuffer);
        outputBuffer = '';

        dot.className = 'status-dot ok';
        appendOutput('');
        appendOutput('✓ Execution completed', 'ok');
      } catch (err) {
        if (outputBuffer.trim()) appendOutput(outputBuffer);
        dot.className = 'status-dot err';
        appendOutput('');
        appendOutput('✗ ' + err.message, 'err');
      } finally {
        if (origWrite && typeof process !== 'undefined' && process.stdout) {
          process.stdout.write = origWrite;
        }
        console.log = origLog;
        btn.classList.remove('running');
        btn.innerHTML = `<svg viewBox="0 0 24 24" fill="currentColor" width="13" height="13"><path d="M8 5v14l11-7z"/></svg> Run`;
      }
    }
  </script>
</body>
