<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Denner Web Playground (Vanilla)</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@400;700&display=swap');

        body {
            font-family: 'Outfit', sans-serif;
            background-color: #0f111a;
            color: #cbd5e1;
        }

        .glass {
            background: rgba(30, 34, 51, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .monaco-editor,
        .overflow-guard {
            border-radius: 12px !important;
        }

        pre {
            font-family: 'JetBrains Mono', monospace;
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.1);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>

<body class="min-h-screen p-4 flex flex-col gap-4 overflow-hidden h-screen">

    <!-- Header -->
    <header class="glass rounded-2xl p-4 flex items-center justify-between shadow-2xl">
        <div class="flex items-center gap-3">
            <div class="bg-white p-2 rounded-xl flex items-center justify-center">
                <img src="logo.png" alt="Denner Logo" class="w-7 h-7 object-contain"
                    onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/c/ca/1x1.png'" />
            </div>
            <div>
                <h1
                    class="text-2xl font-bold bg-gradient-to-r from-pink-400 to-indigo-400 bg-clip-text text-transparent tracking-tight leading-none">
                    Denner Web
                </h1>
                <span class="text-[10px] text-slate-500 uppercase tracking-widest font-bold">Standard Vanilla
                    Edition</span>
            </div>
        </div>

        <div class="flex items-center gap-3">
            <a href="about.html"
                class="flex items-center gap-2 bg-pink-500/10 hover:bg-pink-500/20 text-pink-400 px-5 py-2.5 rounded-xl font-medium transition-all shadow border border-pink-500/20">
                <i data-lucide="info" class="w-4 h-4"></i>
                About Denner
            </a>
            <a href="wiki.html"
                class="flex items-center gap-2 bg-slate-500/10 hover:bg-slate-500/20 text-slate-300 px-5 py-2.5 rounded-xl font-medium transition-all shadow border border-slate-500/20">
                <i data-lucide="book-open" class="w-4 h-4"></i>
                Syntax Wiki
            </a>
            <button id="stopBtn" onclick="stopExecution()"
                class="hidden flex items-center gap-2 bg-rose-500 hover:bg-rose-400 text-white px-6 py-2.5 rounded-xl font-medium transition-all shadow-lg shadow-rose-500/20 active:scale-95">
                <i data-lucide="square" class="w-5 h-5"></i>
                Stop
            </button>
            <button id="runBtn"
                class="flex items-center gap-2 bg-indigo-500 hover:bg-indigo-400 text-white px-6 py-2.5 rounded-xl font-medium transition-all shadow-lg shadow-indigo-500/20 active:scale-95">
                <i data-lucide="play" class="w-5 h-5"></i>
                Run Code
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 flex gap-4 overflow-hidden mb-2">
        <!-- Editor -->
        <div class="flex-1 glass rounded-2xl overflow-hidden shadow-2xl flex flex-col">
            <div
                class="bg-[#1a1d27]/70 border-b border-white/5 px-4 py-2 flex items-center justify-between text-xs font-mono text-slate-400">
                <div class="flex items-center gap-3">
                    <div class="flex items-center gap-1.5 opacity-60">
                        <i data-lucide="code-2" class="w-3.5 h-3.5"></i>
                        <span class="uppercase tracking-widest font-bold text-[9px]">Code</span>
                    </div>
                    <div class="h-3 w-[1px] bg-white/10"></div>
                    <div class="flex items-center gap-2">
                        <div class="w-2 h-2 rounded-full bg-indigo-500 shadow-[0_0_8px_rgba(99,102,241,0.5)]"></div>
                        <span class="text-slate-300">main.den</span>
                    </div>
                </div>
                <div class="flex items-center gap-1">
                    <button id="refreshBtn" title="Refresh (Cmd+R)" class="p-1.5 hover:bg-white/5 rounded-lg transition-colors hover:text-indigo-400 group">
                        <i data-lucide="refresh-cw" class="w-3.5 h-3.5 group-active:rotate-180 transition-transform duration-500"></i>
                    </button>
                    <div class="h-3 w-[1px] bg-white/10 mx-1"></div>
                    <i data-lucide="more-horizontal" class="w-3.5 h-3.5 opacity-30"></i>
                </div>
            </div>
            <div id="editorContainer" class="flex-1"></div>
        </div>

        <!-- Output -->
        <div class="w-1/3 flex flex-col gap-4 overflow-hidden" id="rightPane">
            <!-- Console -->
            <div class="flex-1 glass rounded-2xl overflow-hidden shadow-2xl flex flex-col transition-all"
                id="outputPane">
                <div
                    class="bg-[#1a1d27]/70 border-b border-white/5 px-4 py-2 flex items-center justify-between text-xs font-mono text-slate-400">
                    <div class="flex items-center gap-3">
                        <div class="flex items-center gap-1.5 opacity-60">
                            <i data-lucide="layout" class="w-3.5 h-3.5"></i>
                            <span class="uppercase tracking-widest font-bold text-[9px]">Window</span>
                        </div>
                        <div class="h-3 w-[1px] bg-white/10"></div>
                        <div class="flex items-center gap-2">
                            <i data-lucide="terminal" class="w-3.5 h-3.5"></i>
                            Console Output
                        </div>
                    </div>
                    <button id="clearBtn" class="hover:text-white transition-colors">Clear</button>
                </div>
                <div id="output"
                    class="flex-1 p-6 font-mono text-sm overflow-auto text-emerald-400 whitespace-pre-wrap leading-relaxed">
                    Ready. Write code and click Run.</div>
            </div>

            <!-- Game View (Canvas) -->
            <div id="gamePane"
                class="h-1/2 glass rounded-2xl overflow-hidden shadow-2xl flex flex-col hidden border-2 border-indigo-500/30">
                <div
                    class="bg-[#1a1d27]/70 border-b border-white/5 px-4 py-2 flex items-center justify-between text-xs font-mono text-slate-400">
                    <div class="flex items-center gap-3">
                        <div class="flex items-center gap-1.5 opacity-60">
                            <i data-lucide="layout" class="w-3.5 h-3.5"></i>
                            <span class="uppercase tracking-widest font-bold text-[9px]">Window</span>
                        </div>
                        <div class="h-3 w-[1px] bg-white/10"></div>
                        <div class="flex items-center gap-2">
                            <i data-lucide="gamepad-2" class="w-3.5 h-3.5 text-indigo-400"></i>
                            Game Canvas
                        </div>
                    </div>
                </div>
                <div class="flex-1 flex items-center justify-center bg-black overflow-hidden relative">
                    <canvas id="denner-canvas" class="max-w-full max-h-full"></canvas>
                </div>
            </div>
        </div>
    </main>

    <!-- Monaco Editor Loader -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.52.2/min/vs/loader.js"></script>

    <!-- Denner Compiler (Bundled) -->
    <script src="./denner-compiler-v140.js"></script>

    <script>
        // Lucide Icons initialization
        lucide.createIcons();

        let editor;
        const DEFAULT_CODE = `// Physics & Collision Example\ngui.setup(400, 400)\n\nlet player = <rect id="player" x={150} y={50} w={30} h={30} color="blue" />\nlet ground = <rect id="ground" x={0} y={350} w={400} h={50} color="green" />\n\nlet p = gui.add(player)\nlet g = gui.add(ground)\n\np.enablePhysics({ gravity: 15 })\ng.enablePhysics({ gravity: 0 })\n\np.on("collision", function(e) {\n  if e.targetId == "ground" {\n      p.color = "red"\n  }\n})\n\nlog.print("🚀 Game started! Use Left/Right keys.")\ngui.loop()`;

        require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.52.2/min/vs' } });

        require(['vs/editor/editor.main'], function () {
            // Register Denner Language
            monaco.languages.register({ id: 'denner' });
            monaco.languages.setMonarchTokensProvider('denner', {
                keywords: ["function", "return", "if", "else", "for", "in", "import", "export", "as"],
                typeKeywords: ["num", "str", "bool", "list", "obj"],
                operators: ["=", ">", "<", "!", "~", "?", ":", "==", "<=", ">=", "!=", "&&", "||", "++", "--", "+", "-", "*", "/", "&", "|", "^", "%", ".."],
                symbols: /[=><!~?:&|+*\/^%\-]+/,
                escapes: /\\(?:[abfnrtv\\"']|x[0-9A-Fa-f]{1,4}|u[0-9A-Fa-f]{4}|U[0-9A-Fa-f]{8})/,
                tokenizer: {
                    root: [
                        [/[a-zA-Z_$][\w$]*/, {
                            cases: {
                                "@typeKeywords": "type",
                                "@keywords": "keyword",
                                "@default": "identifier"
                            }
                        }],
                        { include: "@whitespace" },
                        [/[{}()\[\]]/, "@brackets"],
                        [/@symbols/, { cases: { "@operators": "operator", "@default": "" } }],
                        [/\d*\.\d+([eE][\-+]?\d+)?/, "number.float"],
                        [/\d+/, "number"],
                        [/"([^"\\]|\\.)*$/, "string.invalid"],
                        [/"/, { token: "string.quote", bracket: "@open", next: "@string" }]
                    ],
                    string: [
                        [/[^\\"]+/, "string"],
                        [/@escapes/, "string.escape"],
                        [/\\./, "string.escape.invalid"],
                        [/"/, { token: "string.quote", bracket: "@close", next: "@pop" }]
                    ],
                    whitespace: [
                        [/[ \t\r\n]+/, "white"],
                        [/\/\/.*$/, "comment"]
                    ]
                }
            });

            monaco.editor.defineTheme('denner-dark', {
                base: 'vs-dark',
                inherit: true,
                rules: [
                    { token: 'keyword', foreground: 'c678dd', fontStyle: 'bold' },
                    { token: 'type', foreground: 'e5c07b' },
                    { token: 'identifier', foreground: 'e06c75' },
                    { token: 'string', foreground: '98c379' },
                    { token: 'number', foreground: 'd19a66' },
                    { token: 'comment', foreground: '5c6370', fontStyle: 'italic' },
                    { token: 'operator', foreground: '56b6c2' }
                ],
                colors: {
                    'editor.background': '#00000000',
                    'editor.lineHighlightBackground': '#ffffff0A',
                    'editorLineNumber.foreground': '#4b5263',
                    'editorIndentGuide.background': '#3b4048',
                }
            });

            monaco.languages.registerCompletionItemProvider('denner', {
                provideCompletionItems: function (model, position) {
                    const word = model.getWordUntilPosition(position);
                    const range = {
                        startLineNumber: position.lineNumber,
                        endLineNumber: position.lineNumber,
                        startColumn: word.startColumn,
                        endColumn: word.endColumn
                    };

                    const text = model.getValue();
                    const dynamicSuggestions = [];
                    const seen = new Set();

                    // Regex for functions: function name(
                    const funcRegex = /function\s+([a-zA-Z_$][\w$]*)\s*\(/g;
                    let match;
                    while ((match = funcRegex.exec(text)) !== null) {
                        const name = match[1];
                        if (!seen.has(name)) {
                            seen.add(name);
                            dynamicSuggestions.push({
                                label: name,
                                kind: monaco.languages.CompletionItemKind.Function,
                                insertText: name + '($0)',
                                insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet,
                                detail: 'Function in this file',
                                range: range
                            });
                        }
                    }

                    // Regex for variables: name = value, or name: type = value
                    const varRegex = /([a-zA-Z_$][\w$]*)\s*(?::\s*[a-zA-Z_$][\w$]*\s*)?=/g;
                    while ((match = varRegex.exec(text)) !== null) {
                        const name = match[1];
                        if (['if', 'else', 'for', 'while', 'return', 'function', 'import', 'export'].includes(name)) continue;

                        if (!seen.has(name)) {
                            seen.add(name);
                            dynamicSuggestions.push({
                                label: name,
                                kind: monaco.languages.CompletionItemKind.Variable,
                                insertText: name,
                                detail: 'Variable in this file',
                                range: range
                            });
                        }
                    }

                    return {
                        suggestions: [
                            ...dynamicSuggestions,
                            { label: 'function', kind: monaco.languages.CompletionItemKind.Keyword, insertText: 'function ', range: range },
                            { label: 'return', kind: monaco.languages.CompletionItemKind.Keyword, insertText: 'return ', range: range },
                            { label: 'if', kind: monaco.languages.CompletionItemKind.Keyword, insertText: 'if ', range: range },
                            { label: 'else', kind: monaco.languages.CompletionItemKind.Keyword, insertText: 'else {\n\t$0\n}', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet, range: range },
                            { label: 'for', kind: monaco.languages.CompletionItemKind.Keyword, insertText: 'for ', range: range },
                            { label: 'in', kind: monaco.languages.CompletionItemKind.Keyword, insertText: 'in ', range: range },
                            { label: 'import', kind: monaco.languages.CompletionItemKind.Keyword, insertText: 'import "$1" as $2', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet, range: range },
                            { label: 'export', kind: monaco.languages.CompletionItemKind.Keyword, insertText: 'export ', range: range },
                            { label: 'num', kind: monaco.languages.CompletionItemKind.Keyword, insertText: 'num', range: range },
                            { label: 'str', kind: monaco.languages.CompletionItemKind.Keyword, insertText: 'str', range: range },
                            { label: 'bool', kind: monaco.languages.CompletionItemKind.Keyword, insertText: 'bool', range: range },
                            { label: 'list', kind: monaco.languages.CompletionItemKind.Keyword, insertText: 'list', range: range },
                            { label: 'obj', kind: monaco.languages.CompletionItemKind.Keyword, insertText: 'obj', range: range },

                            // Stdlib Functions
                            { label: 'log.print', detail: 'Print to console', kind: monaco.languages.CompletionItemKind.Function, insertText: 'log.print($1)', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet, range: range },
                            { label: 'os.name', detail: 'Get OS name', kind: monaco.languages.CompletionItemKind.Function, insertText: 'os.name()', range: range },
                            { label: 'os.env', detail: 'Get Env variable', kind: monaco.languages.CompletionItemKind.Function, insertText: 'os.env("$1")', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet, range: range },
                            { label: 'path.join', detail: 'Join paths', kind: monaco.languages.CompletionItemKind.Function, insertText: 'path.join($1, $2)', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet, range: range },
                            { label: 'net.get', detail: 'HTTP GET request (async)', kind: monaco.languages.CompletionItemKind.Function, insertText: 'net.get("$1")', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet, range: range },
                            { label: 'cli.input', detail: 'Prompt user input (async)', kind: monaco.languages.CompletionItemKind.Function, insertText: 'cli.input("$1")', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet, range: range },
                            { label: 'gui.alert', detail: 'Show native alert modal', kind: monaco.languages.CompletionItemKind.Function, insertText: 'gui.alert($1)', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet, range: range },
                            
                            // String Methods
                            { label: 'string.replace', detail: 'Replace substring', kind: monaco.languages.CompletionItemKind.Function, insertText: 'string.replace($1, "$2", "$3")', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet, range: range },
                            { label: 'string.split', detail: 'Split string into array', kind: monaco.languages.CompletionItemKind.Function, insertText: 'string.split($1, "$2")', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet, range: range },
                            { label: 'string.trim', detail: 'Remove whitespace from both ends', kind: monaco.languages.CompletionItemKind.Function, insertText: 'string.trim($1)', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet, range: range },
                            { label: 'string.upper', detail: 'Convert to uppercase', kind: monaco.languages.CompletionItemKind.Function, insertText: 'string.upper($1)', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet, range: range },
                            { label: 'string.lower', detail: 'Convert to lowercase', kind: monaco.languages.CompletionItemKind.Function, insertText: 'string.lower($1)', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet, range: range },
                            { label: 'string.length', detail: 'Get string length', kind: monaco.languages.CompletionItemKind.Function, insertText: 'string.length($1)', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet, range: range },
                            { label: 'string.includes', detail: 'Check if contains substring', kind: monaco.languages.CompletionItemKind.Function, insertText: 'string.includes($1, "$2")', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet, range: range },
                            { label: 'string.indexof', detail: 'Find index of substring', kind: monaco.languages.CompletionItemKind.Function, insertText: 'string.indexof($1, "$2")', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet, range: range },
                            { label: 'string.startswith', detail: 'Check if starts with prefix', kind: monaco.languages.CompletionItemKind.Function, insertText: 'string.startswith($1, "$2")', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet, range: range },
                            { label: 'string.endswith', detail: 'Check if ends with suffix', kind: monaco.languages.CompletionItemKind.Function, insertText: 'string.endswith($1, "$2")', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet, range: range },
                            { label: 'string.substring', detail: 'Extract substring', kind: monaco.languages.CompletionItemKind.Function, insertText: 'string.substring($1, $2, $3)', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet, range: range },
                            { label: 'string.charat', detail: 'Get character at index', kind: monaco.languages.CompletionItemKind.Function, insertText: 'string.charat($1, $2)', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet, range: range },
                            { label: 'string.repeat', detail: 'Repeat string n times', kind: monaco.languages.CompletionItemKind.Function, insertText: 'string.repeat($1, $2)', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet, range: range },
                        ]
                    };
                }
            });

            editor = monaco.editor.create(document.getElementById('editorContainer'), {
                value: DEFAULT_CODE,
                language: 'denner',
                theme: 'denner-dark',
                minimap: { enabled: true },
                fontSize: 14,
                fontFamily: "'JetBrains Mono', monospace",
                automaticLayout: true,
                padding: { top: 20 },
                lineNumbers: 'on',
                scrollBeyondLastLine: false,
                cursorSmoothCaretAnimation: "on",
                cursorBlinking: "smooth",
                renderLineHighlight: "all",
            });
        });

        // Run Logic
        const outputDiv = document.getElementById('output');
        const runBtn = document.getElementById('runBtn');
        const stopBtn = document.getElementById('stopBtn');
        const clearBtn = document.getElementById('clearBtn');
        const refreshBtn = document.getElementById('refreshBtn');

        let denner_should_stop = false;
        let denner_executor = null;

        window.stopExecution = function() {
            denner_should_stop = true;
        };

        const runCode = async () => {
            if (!editor || runBtn.disabled) return;
            denner_should_stop = true; // Stop existing
            setTimeout(async () => {
                denner_should_stop = false;
                runBtn.click();
            }, 50);
        };

        refreshBtn.addEventListener('click', runCode);

        // Keyboard Shortcut: Cmd+R or Ctrl+R
        window.addEventListener('keydown', (e) => {
            if ((e.metaKey || e.ctrlKey) && e.key === 'r') {
                e.preventDefault();
                runCode();
            }
            if ((e.metaKey || e.ctrlKey) && e.key === 's') {
                e.preventDefault();
                runCode();
            }
        });

        runBtn.addEventListener('click', async () => {
            if (!editor) return;
            denner_should_stop = false;
            runBtn.classList.add('hidden');
            stopBtn.classList.remove('hidden');
            const originalText = runBtn.innerHTML;
            runBtn.disabled = true;
            runBtn.innerHTML = `<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> Resolving...`;
            lucide.createIcons();

            outputDiv.innerText = "Resolving imports...";

            try {
                const code = editor.getValue();

                // 1. Resolve Imports
                const resolver = new DennerBundle.BrowserResolver();
                const importRegex = /import\s+"([^"]+)"/g;
                let match;
                while ((match = importRegex.exec(code)) !== null) {
                    await resolver.resolve(match[1], window.location.href);
                }

                outputDiv.innerText = "Compiling...";
                const fullSource = resolver.getFullSource(code);

                // 2. Tokenize & Parse
                const lexer = new DennerBundle.Lexer(fullSource);
                const tokens = lexer.tokenize();
                const parser = new DennerBundle.Parser(tokens);
                const ast = parser.parse();

                // 3. Transpile
                const jscodegen = new DennerBundle.JSCodeGenerator(ast);
                const jsCode = jscodegen.generate();

                // 4. Execute
                outputDiv.innerText = "";
                let logs = "";
                const denner_system_print = (val) => {
                    logs += (val === undefined ? "" : val.toString()) + "\n";
                    outputDiv.innerText = logs;
                };

                const denner_canvas = document.getElementById('denner-canvas');
                if (denner_canvas) {
                    try {
                        denner_canvas.setAttribute('tabindex', '0');
                        denner_canvas.style.outline = 'none';
                        denner_canvas.addEventListener('click', () => { denner_canvas.focus(); });
                    } catch (e) { }
                }
                const gamePane = document.getElementById('gamePane');
                let ctx = null;
                let lastKey = "";

                // --- Physics Engine ---
                const physicsObjects = [];

                class DennerElement {
                     constructor(tag, attributes, children) {
                         this.tag = tag; this.attributes = attributes; this.children = children;
                     }
                }

                class DennerObject {
                    constructor(type, x, y, w, h, extra) {
                        this.id = extra.id || type + '-' + Date.now();
                        this.type = type;
                        this.x = x; this.y = y; this.w = w; this.h = h;
                        this.vx = 0; this.vy = 0;
                        this.physicsEnabled = false;
                        this.gravity = 0;
                        this.color = extra.color || "#fff";
                        this.img = extra.img || null;
                        this.onCollision = null;
                        this.collisionEffect = 0;
                        this.animType = null;
                        this.animDuration = 0;
                        this.animTimer = 0;
                        physicsObjects.push(this);
                    }
                    enablePhysics(config) {
                        config = config || {};
                        this.physicsEnabled = true;
                        this.gravity = (typeof config.gravity === 'number') ? config.gravity : 9.8;
                        return this;
                    }
                    on(event, cb) {
                        if (event === 'collision') this.onCollision = cb;
                        return this;
                    }
                    setImage(url) {
                        const img = new Image();
                        img.src = url;
                        this.img = img;
                        this.type = 'image';
                    }
                    animate(type, duration) {
                        this.animType = type;
                        this.animDuration = duration || 1000;
                        this.animTimer = Math.ceil(this.animDuration / 16.6); // Convert ms to frames approx
                        return this;
                    }
                    update() {
                        if (!this.physicsEnabled) return;

                        // Apply Gravity
                        this.vy += this.gravity * 0.016; 
                        
                        // Vertical dampening (Stop jitter)
                        if (Math.abs(this.vy) < 0.1) this.vy = 0;

                        this.x += this.vx;
                        this.y += this.vy;

                        // Floor Collision
                        if (denner_canvas && this.y + this.h > denner_canvas.height) {
                            this.y = denner_canvas.height - this.h;
                            if (Math.abs(this.vy) > 0.5) {
                                this.vy *= -0.5; // Bounce
                            } else {
                                this.vy = 0; // Stop
                            }
                            if (this.onCollision) this.onCollision({ targetId: "floor", targetType: 'boundary', selfId: this.id });
                        }

                        // Object-to-object collisions
                        for (let i = 0; i < physicsObjects.length; i++) {
                            const other = physicsObjects[i];
                            if (other === this) continue;
                            
                            // Simple AABB collision
                            if (this.x < other.x + other.w && this.x + this.w > other.x && 
                                this.y < other.y + other.h && this.y + this.h > other.y) {
                                
                                if (this.onCollision) this.onCollision({ targetId: other.id, targetType: other.type, selfId: this.id });
                                
                                // Resolve Overlap (Basic)
                                const overlapY = (this.y + this.h/2 > other.y + other.h/2) ? (other.y + other.h - this.y) : (this.y + this.h - other.y);
                                if (Math.abs(this.vy) > 0.1) {
                                    this.y -= (this.y + this.h/2 > other.y + other.h/2) ? -overlapY : overlapY;
                                    this.vy *= -0.3;
                                }
                                
                                this.collisionEffect = 60; // Show ID for 1s
                            }
                        }

                        if (this.collisionEffect > 0) this.collisionEffect--;
                        if (this.animTimer > 0) this.animTimer--;
                    }
                    draw() {
                        if (!ctx) return;
                        ctx.save();

                        // Animation Effects
                        if (this.animTimer > 0 && this.animType) {
                            const totalFrames = Math.ceil(this.animDuration / 16.6);
                            const progress = this.animTimer / totalFrames;
                            
                            if (this.animType === 'fade-out') ctx.globalAlpha = progress;
                            else if (this.animType === 'fade-in') ctx.globalAlpha = 1.0 - progress;
                            else if (this.animType === 'shake') {
                                ctx.translate(Math.random() * 4 - 2, Math.random() * 4 - 2);
                            } else if (this.animType === 'pulse') {
                                const s = 1.0 + Math.sin((1.0 - progress) * Math.PI * 4) * 0.1;
                                ctx.translate(this.x + this.w/2, this.y + this.h/2);
                                ctx.scale(s, s);
                                ctx.translate(-(this.x + this.w/2), -(this.y + this.h/2));
                            }
                        }

                        if (this.type === 'rect') {
                            ctx.fillStyle = this.color;
                            ctx.fillRect(this.x, this.y, this.w, this.h);
                        } else if (this.type === 'image' && this.img && this.img.complete) {
                            ctx.drawImage(this.img, this.x, this.y, this.w, this.h);
                        }

                        // Draw ID Effect
                        if (this.collisionEffect > 0) {
                            ctx.globalAlpha = (this.collisionEffect / 60);
                            ctx.fillStyle = "white";
                            ctx.font = "bold 10px Inter, sans-serif";
                            ctx.textAlign = "center";
                            ctx.fillText("ID: " + this.id, this.x + this.w/2, this.y - 10);
                            
                            // Pulse circle
                            ctx.strokeStyle = "rgba(99, 102, 241, 1.0)";
                            ctx.lineWidth = 2;
                            ctx.beginPath();
                            ctx.arc(this.x + this.w/2, this.y + this.h/2, (this.w/2) + (60 - this.collisionEffect)/2, 0, Math.PI * 2);
                            ctx.stroke();
                        }
                        ctx.restore();
                    }
                }

                const keyListener = (e) => {
                    const preventKeys = ['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '];
                    if (preventKeys.includes(e.key)) e.preventDefault();
                    if (e.key === 'Escape') {
                        denner_should_stop = true;
                        return;
                    }
                    const map = {
                        "ArrowUp": "Up", "ArrowDown": "Down",
                        "ArrowLeft": "Left", "ArrowRight": "Right",
                        " ": "Space"
                    };
                    lastKey = map[e.key] || e.key;
                };
                window.addEventListener('keydown', keyListener);

                const denner_stdlib = {
                    os: {
                        name: () => "browser",
                        env: () => "undefined"
                    },
                    path: {
                        join: (a, b) => {
                            if (!a) return b;
                            if (a.endsWith('/')) return a + b;
                            return a + '/' + b;
                        }
                    },
                    net: {
                        get: async (url) => { const r = await fetch(url); return await r.text(); }
                    },
                    cli: {
                        input: async (promptText) => prompt(promptText) || "",
                        get_key: async () => {
                            return new Promise(resolve => {
                                const check = () => {
                                    if (lastKey) {
                                        const k = lastKey;
                                        lastKey = "";
                                        resolve(k);
                                    } else {
                                        requestAnimationFrame(check);
                                    }
                                };
                                check();
                            });
                        }
                    },
                    gui: {
                        alert: (msg) => alert(msg),
                        setup: (w, h) => {
                            gamePane.classList.remove('hidden');
                            denner_canvas.width = w;
                            denner_canvas.height = h;
                            ctx = denner_canvas.getContext('2d');
                        },
                        clear: (color) => {
                            if (!ctx) return;
                            ctx.fillStyle = color;
                            ctx.fillRect(0, 0, denner_canvas.width, denner_canvas.height);
                        },
                        rect: (x, y, w, h, color) => new DennerObject('rect', x, y, w, h, { color }),
                        image: (url, x, y, w, h) => {
                            const img = new Image();
                            img.src = url;
                            return new DennerObject('image', x, y, w, h, { img });
                        },
                        add: (el) => {
                            if (el.tag === 'rect') {
                                return new DennerObject('rect', el.attributes.x || 0, el.attributes.y || 0, el.attributes.w || 50, el.attributes.h || 50, { color: el.attributes.color || 'white', id: el.attributes.id });
                            } else if (el.tag === 'image') {
                                const img = new Image();
                                img.src = el.attributes.src || '';
                                return new DennerObject('image', el.attributes.x || 0, el.attributes.y || 0, el.attributes.w || 50, el.attributes.h || 50, { img, id: el.attributes.id });
                            }
                            throw new Error("Unsupported GUI element: " + el.tag);
                        },
                        text: (txt, x, y, color) => {
                            if (!ctx) return;
                            ctx.fillStyle = color;
                            ctx.font = "20px JetBrains Mono";
                            ctx.fillText(String(txt), x, y);
                        },
                        get_distance: (o1, o2) => {
                            if (!o1 || !o2) return 0;
                            const dx = (o1.x + o1.w/2) - (o2.x + o2.w/2);
                            const dy = (o1.y + o1.h/2) - (o2.y + o2.h/2);
                            return Math.sqrt(dx * dx + dy * dy);
                        },
                        loop: () => {
                            if (denner_should_stop) return Promise.resolve(false);
                            return new Promise(resolve => {
                                const tick = () => {
                                    if (denner_should_stop) {
                                        resolve(false);
                                        return;
                                    }
                                    
                                    if (ctx) {
                                        ctx.fillStyle = 'black';
                                        ctx.fillRect(0, 0, denner_canvas.width, denner_canvas.height);
                                    }
                                    
                                    // Player control (movement)
                                    const player = physicsObjects.find(o => o.type === 'rect' && !o.physicsEnabled);
                                    if (player) {
                                        if (lastKey === 'Left') player.vx = -6;
                                        else if (lastKey === 'Right') player.vx = 6;
                                        else player.vx = 0;
                                        if (denner_canvas) {
                                            if (player.x < 0) player.x = 0;
                                            if (player.x + player.w > denner_canvas.width) player.x = denner_canvas.width - player.w;
                                        }
                                    }

                                    physicsObjects.forEach(o => o.update());
                                    physicsObjects.forEach(o => o.draw());
                                    requestAnimationFrame(tick);
                                };
                                tick();
                            });
                        },
                        get_last_key: () => {
                            if (denner_should_stop) return "Escape";
                            const k = lastKey;
                            if (k === "Space") lastKey = "";
                            return k;
                        }
                    }
                };

                const denner_string_replace = (str, find, repl) => String(str).replace(find, repl);
                const denner_string_split = (str, sep) => String(str).split(sep);
                const denner_string_trim = (str) => String(str).trim();
                const denner_string_length = (str) => String(str).length;
                const denner_string_upper = (str) => String(str).toUpperCase();
                const denner_string_lower = (str) => String(str).toLowerCase();
                const denner_string_starts = (str, prefix) => String(str).startsWith(prefix);
                const denner_string_ends = (str, suffix) => String(str).endsWith(suffix);
                const denner_string_includes = (str, search) => String(str).includes(search);
                const denner_string_indexof = (str, search) => String(str).indexOf(search);
                const denner_string_substr = (str, start, len) => String(str).substr(start, len);
                const denner_string_substring = (str, start, end) => String(str).substring(start, end);
                const denner_string_charat = (str, i) => String(str).charAt(i);
                const denner_string_repeat = (str, n) => String(str).repeat(n);
                const denner_string_padstart = (str, len, ch) => String(str).padStart(len, ch);
                const denner_string_padend = (str, len, ch) => String(str).padEnd(len, ch);

                const executor = Object.getPrototypeOf(async function () { }).constructor("denner_system_print", "denner", "denner_should_stop", "denner_string_replace", "denner_string_split", "denner_string_trim", "denner_string_length", "denner_string_upper", "denner_string_lower", "denner_string_starts", "denner_string_ends", "denner_string_includes", "denner_string_indexof", "denner_string_substr", "denner_string_substring", "denner_string_charat", "denner_string_repeat", "denner_string_padstart", "denner_string_padend", jsCode);
                try {
                    await executor(denner_system_print, denner_stdlib, denner_should_stop,
                        denner_string_replace, denner_string_split, denner_string_trim, denner_string_length,
                        denner_string_upper, denner_string_lower, denner_string_starts, denner_string_ends,
                        denner_string_includes, denner_string_indexof, denner_string_substr, denner_string_substring,
                        denner_string_charat, denner_string_repeat, denner_string_padstart, denner_string_padend);
                } finally {
                    window.removeEventListener('keydown', keyListener);
                }

                if (!logs) outputDiv.innerText = "(No output)";
            } catch (e) {
                outputDiv.innerHTML = `<span class="text-rose-400 font-bold">Error:</span>\n${e.message}`;
            } finally {
                runBtn.disabled = false;
                runBtn.classList.remove('hidden');
                stopBtn.classList.add('hidden');
                runBtn.innerHTML = originalText;
                lucide.createIcons();
            }
        });

        clearBtn.addEventListener('click', () => {
            outputDiv.innerText = "Ready.";
        });
    </script>
</body>

</html>
