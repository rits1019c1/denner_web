<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Denner Web Playground (Vanilla)</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@400;700&display=swap');
        
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #0f111a;
            color: #cbd5e1;
        }

        .glass {
            background: rgba(30, 34, 51, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .monaco-editor, .overflow-guard {
            border-radius: 12px !important;
        }

        pre {
            font-family: 'JetBrains Mono', monospace;
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.1);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255,255,255,0.2);
        }
    </style>
</head>
<body class="min-h-screen p-4 flex flex-col gap-4 overflow-hidden h-screen">

    <!-- Header -->
    <header class="glass rounded-2xl p-4 flex items-center justify-between shadow-2xl">
        <div class="flex items-center gap-3">
            <div class="bg-white p-2 rounded-xl flex items-center justify-center">
                <img src="logo.png" alt="Denner Logo" class="w-7 h-7 object-contain" onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/c/ca/1x1.png'" />
            </div>
            <div>
                <h1 class="text-2xl font-bold bg-gradient-to-r from-pink-400 to-indigo-400 bg-clip-text text-transparent tracking-tight leading-none">
                    Denner Web
                </h1>
                <span class="text-[10px] text-slate-500 uppercase tracking-widest font-bold">Standard Vanilla Edition</span>
            </div>
        </div>

        <div class="flex items-center gap-3">
            <a href="about.html" class="flex items-center gap-2 bg-pink-500/10 hover:bg-pink-500/20 text-pink-400 px-5 py-2.5 rounded-xl font-medium transition-all shadow border border-pink-500/20">
                <i data-lucide="info" class="w-4 h-4"></i>
                About Denner
            </a>
            <a href="wiki.html" target="_blank" class="flex items-center gap-2 bg-slate-500/10 hover:bg-slate-500/20 text-slate-300 px-5 py-2.5 rounded-xl font-medium transition-all shadow border border-slate-500/20">
                <i data-lucide="book-open" class="w-4 h-4"></i>
                Syntax Wiki
            </a>
            <button id="runBtn" class="flex items-center gap-2 bg-indigo-500 hover:bg-indigo-400 text-white px-6 py-2.5 rounded-xl font-medium transition-all shadow-lg shadow-indigo-500/20 active:scale-95">
                <i data-lucide="play" class="w-5 h-5"></i>
                Run Code
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 flex gap-4 overflow-hidden mb-2">
        <!-- Editor -->
        <div class="flex-1 glass rounded-2xl overflow-hidden shadow-2xl flex flex-col">
            <div class="bg-[#1a1d27]/70 border-b border-white/5 px-4 py-2 flex items-center gap-2 text-xs font-mono text-slate-400">
                <div class="w-2.5 h-2.5 rounded-full bg-slate-600"></div>
                main.den
            </div>
            <div id="editorContainer" class="flex-1"></div>
        </div>

        <!-- Output -->
        <div class="w-1/3 flex flex-col gap-4 overflow-hidden" id="rightPane">
            <!-- Console -->
            <div class="flex-1 glass rounded-2xl overflow-hidden shadow-2xl flex flex-col transition-all" id="outputPane">
                <div class="bg-[#1a1d27]/70 border-b border-white/5 px-4 py-2 flex items-center justify-between text-xs font-mono text-slate-400">
                    <div class="flex items-center gap-2">
                        <i data-lucide="terminal" class="w-3.5 h-3.5"></i>
                        Console Output
                    </div>
                    <button id="clearBtn" class="hover:text-white transition-colors">Clear</button>
                </div>
                <div id="output" class="flex-1 p-6 font-mono text-sm overflow-auto text-emerald-400 whitespace-pre-wrap leading-relaxed">Ready. Write code and click Run.</div>
            </div>

            <!-- Game View (Canvas) -->
            <div id="gamePane" class="h-1/2 glass rounded-2xl overflow-hidden shadow-2xl flex flex-col hidden border-2 border-indigo-500/30">
                <div class="bg-[#1a1d27]/70 border-b border-white/5 px-4 py-2 flex items-center justify-between text-xs font-mono text-slate-400">
                    <div class="flex items-center gap-2">
                        <i data-lucide="gamepad-2" class="w-3.5 h-3.5 text-indigo-400"></i>
                        Game Canvas
                    </div>
                </div>
                <div class="flex-1 flex items-center justify-center bg-black overflow-hidden relative">
                    <canvas id="denner-canvas" class="max-w-full max-h-full"></canvas>
                </div>
            </div>
        </div>
    </main>

    <!-- Monaco Editor Loader -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.52.2/min/vs/loader.js"></script>
    
    <!-- Denner Compiler (Bundled) -->
    <script src="./denner-compiler-v132.js"></script>

    <script>
        // Lucide Icons initialization
        lucide.createIcons();

        let editor;
        const DEFAULT_CODE = `// Denner Vanilla Playground\n\nname = "Denner"\nversion = "2.0"\n\nlog.print("🚀 Running {name} v{version}!")\n\nfunction fib(n: num): num {\n  if n < 2 { return n }\n  return fib(n - 1) + fib(n - 2)\n}\n\nlog.print("Fibonacci(10):")\nlog.print(fib(10))`;

        require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.52.2/min/vs' }});

        require(['vs/editor/editor.main'], function() {
            // Register Denner Language
            monaco.languages.register({ id: 'denner' });
            monaco.languages.setMonarchTokensProvider('denner', {
                keywords: ["function", "return", "if", "else", "for", "in", "import", "export", "as"],
                typeKeywords: ["num", "str", "bool", "list", "obj"],
                operators: ["=", ">", "<", "!", "~", "?", ":", "==", "<=", ">=", "!=", "&&", "||", "++", "--", "+", "-", "*", "/", "&", "|", "^", "%", ".."],
                symbols: /[=><!~?:&|+*\/^%\-]+/,
                escapes: /\\(?:[abfnrtv\\"']|x[0-9A-Fa-f]{1,4}|u[0-9A-Fa-f]{4}|U[0-9A-Fa-f]{8})/,
                tokenizer: {
                    root: [
                        [/[a-zA-Z_$][\w$]*/, {
                            cases: {
                                "@typeKeywords": "type",
                                "@keywords": "keyword",
                                "@default": "identifier"
                            }
                        }],
                        { include: "@whitespace" },
                        [/[{}()\[\]]/, "@brackets"],
                        [/@symbols/, { cases: { "@operators": "operator", "@default": "" } }],
                        [/\d*\.\d+([eE][\-+]?\d+)?/, "number.float"],
                        [/\d+/, "number"],
                        [/"([^"\\]|\\.)*$/, "string.invalid"],
                        [/"/, { token: "string.quote", bracket: "@open", next: "@string" }]
                    ],
                    string: [
                        [/[^\\"]+/, "string"],
                        [/@escapes/, "string.escape"],
                        [/\\./, "string.escape.invalid"],
                        [/"/, { token: "string.quote", bracket: "@close", next: "@pop" }]
                    ],
                    whitespace: [
                        [/[ \t\r\n]+/, "white"],
                        [/\/\/.*$/, "comment"]
                    ]
                }
            });

            monaco.editor.defineTheme('denner-dark', {
                base: 'vs-dark',
                inherit: true,
                rules: [
                    { token: 'keyword', foreground: 'c678dd', fontStyle: 'bold' },
                    { token: 'type', foreground: 'e5c07b' },
                    { token: 'identifier', foreground: 'e06c75' },
                    { token: 'string', foreground: '98c379' },
                    { token: 'number', foreground: 'd19a66' },
                    { token: 'comment', foreground: '5c6370', fontStyle: 'italic' },
                    { token: 'operator', foreground: '56b6c2' }
                ],
                colors: {
                    'editor.background': '#00000000',
                    'editor.lineHighlightBackground': '#ffffff0A',
                    'editorLineNumber.foreground': '#4b5263',
                    'editorIndentGuide.background': '#3b4048',
                }
            });

            monaco.languages.registerCompletionItemProvider('denner', {
                provideCompletionItems: function(model, position) {
                    const word = model.getWordUntilPosition(position);
                    const range = {
                        startLineNumber: position.lineNumber,
                        endLineNumber: position.lineNumber,
                        startColumn: word.startColumn,
                        endColumn: word.endColumn
                    };
                    
                    const text = model.getValue();
                    const dynamicSuggestions = [];
                    const seen = new Set();
                    
                    // Regex for functions: function name(
                    const funcRegex = /function\s+([a-zA-Z_$][\w$]*)\s*\(/g;
                    let match;
                    while ((match = funcRegex.exec(text)) !== null) {
                        const name = match[1];
                        if (!seen.has(name)) {
                            seen.add(name);
                            dynamicSuggestions.push({
                                label: name,
                                kind: monaco.languages.CompletionItemKind.Function,
                                insertText: name + '($0)',
                                insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet,
                                detail: 'Function in this file',
                                range: range
                            });
                        }
                    }

                    // Regex for variables: name = value, or name: type = value
                    const varRegex = /([a-zA-Z_$][\w$]*)\s*(?::\s*[a-zA-Z_$][\w$]*\s*)?=/g;
                    while ((match = varRegex.exec(text)) !== null) {
                        const name = match[1];
                        if (['if', 'else', 'for', 'while', 'return', 'function', 'import', 'export'].includes(name)) continue;
                        
                        if (!seen.has(name)) {
                            seen.add(name);
                            dynamicSuggestions.push({
                                label: name,
                                kind: monaco.languages.CompletionItemKind.Variable,
                                insertText: name,
                                detail: 'Variable in this file',
                                range: range
                            });
                        }
                    }

                    return {
                        suggestions: [
                            ...dynamicSuggestions,
                            { label: 'function', kind: monaco.languages.CompletionItemKind.Keyword, insertText: 'function ', range: range },
                            { label: 'return', kind: monaco.languages.CompletionItemKind.Keyword, insertText: 'return ', range: range },
                            { label: 'if', kind: monaco.languages.CompletionItemKind.Keyword, insertText: 'if ', range: range },
                            { label: 'else', kind: monaco.languages.CompletionItemKind.Keyword, insertText: 'else {\n\t$0\n}', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet, range: range },
                            { label: 'for', kind: monaco.languages.CompletionItemKind.Keyword, insertText: 'for ', range: range },
                            { label: 'in', kind: monaco.languages.CompletionItemKind.Keyword, insertText: 'in ', range: range },
                            { label: 'import', kind: monaco.languages.CompletionItemKind.Keyword, insertText: 'import "$1" as $2', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet, range: range },
                            { label: 'export', kind: monaco.languages.CompletionItemKind.Keyword, insertText: 'export ', range: range },
                            { label: 'num', kind: monaco.languages.CompletionItemKind.Keyword, insertText: 'num', range: range },
                            { label: 'str', kind: monaco.languages.CompletionItemKind.Keyword, insertText: 'str', range: range },
                            { label: 'bool', kind: monaco.languages.CompletionItemKind.Keyword, insertText: 'bool', range: range },
                            { label: 'list', kind: monaco.languages.CompletionItemKind.Keyword, insertText: 'list', range: range },
                            { label: 'obj', kind: monaco.languages.CompletionItemKind.Keyword, insertText: 'obj', range: range },
                            
                            // Stdlib Functions
                            { label: 'log.print', detail: 'Print to console', kind: monaco.languages.CompletionItemKind.Function, insertText: 'log.print($1)', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet, range: range },
                            { label: 'os.name', detail: 'Get OS name', kind: monaco.languages.CompletionItemKind.Function, insertText: 'os.name()', range: range },
                            { label: 'os.env', detail: 'Get Env variable', kind: monaco.languages.CompletionItemKind.Function, insertText: 'os.env("$1")', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet, range: range },
                            { label: 'path.join', detail: 'Join paths', kind: monaco.languages.CompletionItemKind.Function, insertText: 'path.join($1, $2)', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet, range: range },
                            { label: 'net.get', detail: 'HTTP GET request (async)', kind: monaco.languages.CompletionItemKind.Function, insertText: 'net.get("$1")', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet, range: range },
                            { label: 'cli.input', detail: 'Prompt user input (async)', kind: monaco.languages.CompletionItemKind.Function, insertText: 'cli.input("$1")', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet, range: range },
                            { label: 'gui.alert', detail: 'Show native alert modal', kind: monaco.languages.CompletionItemKind.Function, insertText: 'gui.alert($1)', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet, range: range },
                        ]
                    };
                }
            });

            editor = monaco.editor.create(document.getElementById('editorContainer'), {
                value: DEFAULT_CODE,
                language: 'denner',
                theme: 'denner-dark',
                minimap: { enabled: true },
                fontSize: 14,
                fontFamily: "'JetBrains Mono', monospace",
                automaticLayout: true,
                padding: { top: 20 },
                lineNumbers: 'on',
                scrollBeyondLastLine: false,
                cursorSmoothCaretAnimation: "on",
                cursorBlinking: "smooth",
                renderLineHighlight: "all",
            });
        });

        // Run Logic
        const outputDiv = document.getElementById('output');
        const runBtn = document.getElementById('runBtn');
        const clearBtn = document.getElementById('clearBtn');

        runBtn.addEventListener('click', async () => {
            if (!editor) return;
            const originalText = runBtn.innerHTML;
            runBtn.disabled = true;
            runBtn.innerHTML = `<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> Resolving...`;
            lucide.createIcons();
            
            outputDiv.innerText = "Resolving imports...";
            
            try {
                const code = editor.getValue();
                
                // 1. Resolve Imports
                const resolver = new DennerBundle.BrowserResolver();
                const importRegex = /import\s+"([^"]+)"/g;
                let match;
                while ((match = importRegex.exec(code)) !== null) {
                    await resolver.resolve(match[1], window.location.href);
                }

                outputDiv.innerText = "Compiling...";
                const fullSource = resolver.getFullSource(code);

                // 2. Tokenize & Parse
                const lexer = new DennerBundle.Lexer(fullSource);
                const tokens = lexer.tokenize();
                const parser = new DennerBundle.Parser(tokens);
                const ast = parser.parse();
                
                // 3. Transpile
                const jscodegen = new DennerBundle.JSCodeGenerator(ast);
                const jsCode = jscodegen.generate();

                // 4. Execute
                outputDiv.innerText = "";
                let logs = "";
                const denner_system_print = (val) => {
                    logs += (val === undefined ? "" : val.toString()) + "\n";
                    outputDiv.innerText = logs;
                };

                const denner_canvas = document.getElementById('denner-canvas');
                const gamePane = document.getElementById('gamePane');
                let ctx = null;
                let lastKey = "";
                
                const keyListener = (e) => {
                    const map = {
                        "ArrowUp": "Up", "ArrowDown": "Down", 
                        "ArrowLeft": "Left", "ArrowRight": "Right",
                        " ": "Space"
                    };
                    lastKey = map[e.key] || e.key;
                };
                window.addEventListener('keydown', keyListener);

                const denner_stdlib = {
                    os: {
                        name: () => "browser",
                        env: () => "undefined"
                    },
                    path: {
                        join: (a, b) => {
                            if (!a) return b;
                            if (a.endsWith('/')) return a + b;
                            return a + '/' + b;
                        }
                    },
                    net: {
                        get: async (url) => { const r = await fetch(url); return await r.text(); }
                    },
                    cli: {
                        input: async (promptText) => prompt(promptText) || "",
                        get_key: async () => {
                            return new Promise(resolve => {
                                const check = () => {
                                    if (lastKey) {
                                        const k = lastKey;
                                        lastKey = "";
                                        resolve(k);
                                    } else {
                                        requestAnimationFrame(check);
                                    }
                                };
                                check();
                            });
                        }
                    },
                    gui: {
                        alert: (msg) => alert(msg),
                        setup: (w, h) => {
                            gamePane.classList.remove('hidden');
                            denner_canvas.width = w;
                            denner_canvas.height = h;
                            ctx = denner_canvas.getContext('2d');
                        },
                        clear: (color) => {
                            if (!ctx) return;
                            ctx.fillStyle = color;
                            ctx.fillRect(0, 0, denner_canvas.width, denner_canvas.height);
                        },
                        rect: (x, y, w, h, color) => {
                            if (!ctx) return;
                            ctx.fillStyle = color;
                            ctx.fillRect(x, y, w, h);
                        },
                        text: (txt, x, y, color) => {
                            if (!ctx) return;
                            ctx.fillStyle = color;
                            ctx.font = "20px JetBrains Mono";
                            ctx.fillText(txt, x, y);
                        },
                        loop: async () => {
                            return new Promise(resolve => requestAnimationFrame(resolve));
                        }
                    }
                };

                const executor = Object.getPrototypeOf(async function(){}).constructor("denner_system_print", "denner", jsCode);
                try {
                    await executor(denner_system_print, denner_stdlib);
                } finally {
                    window.removeEventListener('keydown', keyListener);
                }

                if (!logs) outputDiv.innerText = "(No output)";
            } catch (e) {
                outputDiv.innerHTML = `<span class="text-rose-400 font-bold">Error:</span>\n${e.message}`;
            } finally {
                runBtn.disabled = false;
                runBtn.innerHTML = originalText;
                lucide.createIcons();
            }
        });

        clearBtn.addEventListener('click', () => {
            outputDiv.innerText = "Ready.";
        });
    </script>
</body>
</html>
