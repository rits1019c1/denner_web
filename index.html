<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Denner Web Playground (Vanilla)</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@400;700&display=swap');
        
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #0f111a;
            color: #cbd5e1;
        }

        .glass {
            background: rgba(30, 34, 51, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .monaco-editor, .overflow-guard {
            border-radius: 12px !important;
        }

        pre {
            font-family: 'JetBrains Mono', monospace;
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.1);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255,255,255,0.2);
        }
    </style>
</head>
<body class="min-h-screen p-4 flex flex-col gap-4 overflow-hidden h-screen">

    <!-- Header -->
    <header class="glass rounded-2xl p-4 flex items-center justify-between shadow-2xl">
        <div class="flex items-center gap-3">
            <div class="bg-pink-500/20 p-2 rounded-xl">
                <i data-lucide="file-code-2" class="text-pink-400 w-6 h-6"></i>
            </div>
            <div>
                <h1 class="text-2xl font-bold bg-gradient-to-r from-pink-400 to-indigo-400 bg-clip-text text-transparent tracking-tight leading-none">
                    Denner Web
                </h1>
                <span class="text-[10px] text-slate-500 uppercase tracking-widest font-bold">Standard Vanilla Edition</span>
            </div>
        </div>

        <button id="runBtn" class="flex items-center gap-2 bg-indigo-500 hover:bg-indigo-400 text-white px-6 py-2.5 rounded-xl font-medium transition-all shadow-lg shadow-indigo-500/20 active:scale-95">
            <i data-lucide="play" class="w-5 h-5"></i>
            Run Code
        </button>
    </header>

    <!-- Main Content -->
    <main class="flex-1 flex gap-4 overflow-hidden mb-2">
        <!-- Editor -->
        <div class="flex-1 glass rounded-2xl overflow-hidden shadow-2xl flex flex-col">
            <div class="bg-[#1a1d27]/70 border-b border-white/5 px-4 py-2 flex items-center gap-2 text-xs font-mono text-slate-400">
                <div class="w-2.5 h-2.5 rounded-full bg-slate-600"></div>
                main.den
            </div>
            <div id="editorContainer" class="flex-1"></div>
        </div>

        <!-- Output -->
        <div class="w-1/3 glass rounded-2xl overflow-hidden shadow-2xl flex flex-col transition-all" id="outputPane">
            <div class="bg-[#1a1d27]/70 border-b border-white/5 px-4 py-2 flex items-center justify-between text-xs font-mono text-slate-400">
                <div class="flex items-center gap-2">
                    <i data-lucide="terminal" class="w-3.5 h-3.5"></i>
                    Console Output
                </div>
                <button id="clearBtn" class="hover:text-white transition-colors">Clear</button>
            </div>
            <div id="output" class="flex-1 p-6 font-mono text-sm overflow-auto text-emerald-400 whitespace-pre-wrap leading-relaxed">Ready. Write code and click Run.</div>
        </div>
    </main>

    <!-- Monaco Editor Loader -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.52.2/min/vs/loader.js"></script>
    
    <!-- Denner Compiler (Bundled) -->
    <script src="./denner-compiler.js"></script>

    <script>
        // Lucide Icons initialization
        lucide.createIcons();

        let editor;
        const DEFAULT_CODE = `// Denner Vanilla Playground\n\nname = "Denner"\nversion = "2.0"\n\nlog.print("🚀 Running {name} v{version}!")\n\nfunction fib(n: num): num {\n  if n < 2 { return n }\n  return fib(n - 1) + fib(n - 2)\n}\n\nlog.print("Fibonacci(10):")\nlog.print(fib(10))`;

        require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.52.2/min/vs' }});

        require(['vs/editor/editor.main'], function() {
            // Register Denner Language
            monaco.languages.register({ id: 'denner' });
            monaco.languages.setMonarchTokensProvider('denner', {
                keywords: ["function", "return", "if", "else", "for", "in", "import", "export", "as"],
                typeKeywords: ["num", "str", "bool", "list", "obj"],
                operators: ["=", ">", "<", "!", "~", "?", ":", "==", "<=", ">=", "!=", "&&", "||", "++", "--", "+", "-", "*", "/", "&", "|", "^", "%", ".."],
                symbols: /[=><!~?:&|+*\/^%\-]+/,
                escapes: /\\(?:[abfnrtv\\"']|x[0-9A-Fa-f]{1,4}|u[0-9A-Fa-f]{4}|U[0-9A-Fa-f]{8})/,
                tokenizer: {
                    root: [
                        [/[a-zA-Z_$][\w$]*/, {
                            cases: {
                                "@typeKeywords": "type",
                                "@keywords": "keyword",
                                "@default": "identifier"
                            }
                        }],
                        { include: "@whitespace" },
                        [/[{}()\[\]]/, "@brackets"],
                        [/@symbols/, { cases: { "@operators": "operator", "@default": "" } }],
                        [/\d*\.\d+([eE][\-+]?\d+)?/, "number.float"],
                        [/\d+/, "number"],
                        [/"([^"\\]|\\.)*$/, "string.invalid"],
                        [/"/, { token: "string.quote", bracket: "@open", next: "@string" }]
                    ],
                    string: [
                        [/[^\\"]+/, "string"],
                        [/@escapes/, "string.escape"],
                        [/\\./, "string.escape.invalid"],
                        [/"/, { token: "string.quote", bracket: "@close", next: "@pop" }]
                    ],
                    whitespace: [
                        [/[ \t\r\n]+/, "white"],
                        [/\/\/.*$/, "comment"]
                    ]
                }
            });

            monaco.editor.defineTheme('denner-dark', {
                base: 'vs-dark',
                inherit: true,
                rules: [
                    { token: 'keyword', foreground: 'c678dd', fontStyle: 'bold' },
                    { token: 'type', foreground: 'e5c07b' },
                    { token: 'identifier', foreground: 'e06c75' },
                    { token: 'string', foreground: '98c379' },
                    { token: 'number', foreground: 'd19a66' },
                    { token: 'comment', foreground: '5c6370', fontStyle: 'italic' },
                    { token: 'operator', foreground: '56b6c2' }
                ],
                colors: {
                    'editor.background': '#00000000',
                    'editor.lineHighlightBackground': '#ffffff0A',
                    'editorLineNumber.foreground': '#4b5263',
                    'editorIndentGuide.background': '#3b4048',
                }
            });

            editor = monaco.editor.create(document.getElementById('editorContainer'), {
                value: DEFAULT_CODE,
                language: 'denner',
                theme: 'denner-dark',
                minimap: { enabled: true },
                fontSize: 14,
                fontFamily: "'JetBrains Mono', monospace",
                automaticLayout: true,
                padding: { top: 20 },
                lineNumbers: 'on',
                scrollBeyondLastLine: false,
                cursorSmoothCaretAnimation: "on",
                cursorBlinking: "smooth",
                renderLineHighlight: "all",
            });
        });

        // Run Logic
        const outputDiv = document.getElementById('output');
        const runBtn = document.getElementById('runBtn');
        const clearBtn = document.getElementById('clearBtn');

        runBtn.addEventListener('click', () => {
            if (!editor) return;
            outputDiv.innerText = "Running...";
            
            setTimeout(() => {
                try {
                    const code = editor.getValue();
                    let logs = "";

                    // Use the bundled compiler
                    const lexer = new DennerBundle.Lexer(code);
                    const tokens = lexer.tokenize();
                    const parser = new DennerBundle.Parser(tokens);
                    const ast = parser.parse();
                    const jscodegen = new DennerBundle.JSCodeGenerator(ast);
                    const jsCode = jscodegen.generate();

                    const denner_system_print = (val) => {
                        logs += (val === undefined ? "" : val.toString()) + "\n";
                    };

                    const executor = new Function("denner_system_print", jsCode);
                    executor(denner_system_print);

                    outputDiv.innerText = logs.trim() || "(No output)";
                } catch (e) {
                    outputDiv.innerHTML = `<span class="text-rose-400 font-bold">Error:</span>\n${e.message}`;
                }
            }, 50);
        });

        clearBtn.addEventListener('click', () => {
            outputDiv.innerText = "Ready.";
        });
    </script>
</body>
</html>
