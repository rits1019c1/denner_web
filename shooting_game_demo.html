<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shooting Game Demo - Denner 1.4.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono&display=swap');
        
        :root {
            --bg-color: #020617;
            --glass-bg: rgba(30, 41, 59, 0.5);
            --accent-primary: #38bdf8;
            --accent-secondary: #f472b6;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 50% -20%, rgba(56, 189, 248, 0.15) 0%, transparent 60%);
            color: #fff;
            overflow: hidden;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 24px 0 rgba(0, 0, 0, 0.6);
        }

        #gamePane {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        #denner-canvas {
            border: 2px solid rgba(56, 189, 248, 0.1);
            border-radius: 16px;
        }

        #score-board {
            position: absolute;
            top: 2rem;
            right: 2rem;
            padding: 1rem 2rem;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(56, 189, 248, 0.2);
            border-radius: 100px;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 800;
            font-size: 1.5rem;
            color: var(--accent-primary);
            box-shadow: 0 0 30px rgba(56, 189, 248, 0.2);
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body class="p-6">
    <!-- Header -->
    <header class="glass rounded-3xl p-5 mb-6 flex items-center justify-between z-10">
        <div class="flex items-center gap-5">
            <div class="bg-sky-500/20 p-3 rounded-2xl border border-sky-400/20">
                <i data-lucide="rocket" class="w-8 h-8 text-sky-400"></i>
            </div>
            <div>
                <h1 class="text-2xl font-black italic tracking-tighter text-white">
                    DENNER SPACE SHOOTER
                </h1>
                <div class="flex items-center gap-4 text-[10px] font-mono text-sky-400/60 uppercase tracking-[0.2em] mt-1">
                    <span>Version 1.4.0</span>
                    <span class="w-1 h-1 bg-sky-500/40 rounded-full"></span>
                    <span>High Performance Runtime</span>
                </div>
            </div>
        </div>
        
        <div class="flex gap-3">
             <a href="index.html" class="flex items-center gap-2 px-5 py-2.5 bg-white/5 hover:bg-white/10 rounded-2xl transition-all border border-white/10 text-sm font-bold">
                <i data-lucide="layout-grid" class="w-4 h-4"></i> Playground
            </a>
            <button onclick="window.location.reload()" class="flex items-center gap-2 px-5 py-2.5 bg-sky-500/20 hover:bg-sky-500/30 text-sky-300 rounded-2xl transition-all border border-sky-500/20 text-sm font-bold">
                <i data-lucide="play" class="w-4 h-4"></i> Respawn
            </button>
        </div>
    </header>

    <!-- Game Area -->
    <main class="flex-1 glass rounded-[2.5rem] overflow-hidden relative border border-white/5 bg-slate-950/20">
        <div id="gamePane">
            <canvas id="denner-canvas"></canvas>
            <div id="score-board">0000</div>
        </div>
        
        <!-- Controls Help -->
        <div class="absolute bottom-10 left-10 flex gap-6 text-slate-500 font-mono text-[11px] tracking-widest uppercase items-center bg-slate-950/40 px-6 py-3 rounded-2xl border border-white/5 backdrop-blur-md">
            <div class="flex items-center gap-2"><span class="bg-white/10 px-2 py-1 rounded text-white">ARROWS</span> Move</div>
            <div class="flex items-center gap-2"><span class="bg-white/10 px-2 py-1 rounded text-white">SPACE</span> Fire</div>
        </div>
    </main>

    <!-- Denner Compiler & Script -->
    <script src="./denner-compiler-v140.js"></script>

    <script id="denner-code" type="text/denner">
gui.setup(800, 600)

let player = gui.rect(375, 500, 50, 50, "#38bdf8")
player.vx = 0

let bullets = []
let enemies = []
let score = 0

// 敵を出現させる関数
function spawn() {
  let x = 50 + (Math.random() * 700)
  let e = gui.rect(x, -50, 40, 40, "#f472b6")
  e.vy = 2 + (Math.random() * 3)
  enemies.push(e)
}

function shoot() {
  let b = gui.rect(player.x + 20, player.y - 10, 10, 30, "#fbbf24")
  b.vy = -10
  bullets.push(b)
  player.animate("pulse", 200)
}

let timer = 0
let shootCool = 0

while 1 < 2 {
  gui.clear("#020617")
  
  // プレイヤー移動
  let k = gui.get_last_key()
  if k == "Left" { player.vx = -8 }
  else if k == "Right" { player.vx = 8 }
  else { player.vx = 0 }
  
  if k == "Space" {
    if shootCool <= 0 {
      shoot()
      shootCool = 10
    }
  }
  shootCool = shootCool - 1
  
  player.x = player.x + player.vx
  if player.x < 0 { player.x = 0 }
  if player.x > 750 { player.x = 750 }

  // 弾丸の更新
  let i = 0
  while i < string.length(bullets) {
    let b = bullets[i]
    b.y = b.y + b.vy
    if b.y < -50 {
      bullets.splice(i, 1)
    } else {
      i = i + 1
    }
  }

  // 敵の出現と更新
  timer = timer + 1
  if timer > 40 {
    spawn()
    timer = 0
  }

  let j = 0
  while j < string.length(enemies) {
    let e = enemies[j]
    e.y = e.y + e.vy
    
    // 当たり判定 (中心点間の距離)
    let hit = 0
    let bi = 0
    while bi < string.length(bullets) {
      let b = bullets[bi]
      
      // 距離を測る
      let d = gui.get_distance(e, b)
      if d < 30 {
        e.animate("fade-out", 300)
        bullets.splice(bi, 1)
        score = score + 100
        hit = 1
        break
      }
      bi = bi + 1
    }
    
    if (e.y > 600) || (hit == 1) {
      enemies.splice(j, 1)
    } else {
      j = j + 1
    }
  }
  
  // スコア表示
  gui.text("SCORE: " + score, 20, 40, "#38bdf8")

  gui.loop()
}
    </script>

    <script>
        const denner_canvas = document.getElementById('denner-canvas');
        const scoreBoard = document.getElementById('score-board');
        let ctx = null;
        let lastKey = "";
        let denner_should_stop = false;

        // --- Runtime Engine ---
        const physicsObjects = [];

        class DennerObject {
            constructor(type, x, y, w, h, extra) {
                this.id = extra.id || type + '-' + Date.now();
                this.type = type;
                this.x = x; this.y = y; this.w = w; this.h = h;
                this.vx = 0; this.vy = 0;
                this.physicsEnabled = false;
                this.gravity = 0;
                this.color = extra.color || "#fff";
                this.img = extra.img || null;
                this.onCollision = null;
                this.collisionEffect = 0;
                this.animType = null;
                this.animDuration = 0;
                this.animTimer = 0;
                physicsObjects.push(this);
            }
            enablePhysics(config) {
                config = config || {};
                this.physicsEnabled = true;
                this.gravity = (typeof config.gravity === 'number') ? config.gravity : 9.8;
                return this;
            }
            on(event, cb) {
                if (event === 'collision') this.onCollision = cb;
                return this;
            }
            animate(type, duration) {
                this.animType = type;
                this.animDuration = duration || 1000;
                this.animTimer = Math.ceil(this.animDuration / 16.6);
                return this;
            }
            update() {
                if (!this.physicsEnabled) {
                    this.x += this.vx;
                    this.y += this.vy;
                    if (this.collisionEffect > 0) this.collisionEffect--;
                    if (this.animTimer > 0) this.animTimer--;
                    return;
                }
                this.vy += this.gravity * 0.016; 
                if (Math.abs(this.vy) < 0.1) this.vy = 0;
                this.x += this.vx;
                this.y += this.vy;
                if (denner_canvas && this.y + this.h > denner_canvas.height) {
                    this.y = denner_canvas.height - this.h;
                    if (Math.abs(this.vy) > 0.5) { this.vy *= -0.5; } else { this.vy = 0; }
                }
                if (this.collisionEffect > 0) this.collisionEffect--;
                if (this.animTimer > 0) this.animTimer--;
            }
            draw() {
                if (!ctx) return;
                ctx.save();
                if (this.animTimer > 0 && this.animType) {
                    const progress = this.animTimer / Math.ceil(this.animDuration / 16.6);
                    if (this.animType === 'fade-out') ctx.globalAlpha = progress;
                    else if (this.animType === 'fade-in') ctx.globalAlpha = 1.0 - progress;
                    else if (this.animType === 'shake') { ctx.translate(Math.random() * 4 - 2, Math.random() * 4 - 2); }
                    else if (this.animType === 'pulse') {
                        const s = 1.0 + Math.sin((1.0 - progress) * Math.PI * 4) * 0.15;
                        ctx.translate(this.x + this.w/2, this.y + this.h/2);
                        ctx.scale(s, s);
                        ctx.translate(-(this.x + this.w/2), -(this.y + this.h/2));
                    }
                }
                if (this.type === 'rect') {
                    ctx.fillStyle = this.color;
                    ctx.fillRect(this.x, this.y, this.w, this.h);
                }
                ctx.restore();
            }
        }

        window.addEventListener('keydown', (e) => {
            const map = { "ArrowUp": "Up", "ArrowDown": "Down", "ArrowLeft": "Left", "ArrowRight": "Right", " ": "Space" };
            lastKey = map[e.key] || e.key;
        });
        window.addEventListener('keyup', (e) => {
             const map = { "ArrowUp": "Up", "ArrowDown": "Down", "ArrowLeft": "Left", "ArrowRight": "Right", " ": "Space" };
             const k = map[e.key] || e.key;
             if (lastKey === k) lastKey = "";
        });

        const denner_stdlib = {
            os: { name: () => "browser", env: () => "" },
            path: { join: (a, b) => a + "/" + b },
            string: { 
              length: (s) => (Array.isArray(s) ? s.length : String(s).length),
              split: (s, sep) => String(s).split(sep)
            },
            net: { get: async (url) => { const r = await fetch(url); return await r.text(); } },
            cli: {
                get_key: async () => new Promise(resolve => {
                    const check = () => {
                        if (lastKey) { const k = lastKey; lastKey = ""; resolve(k); }
                        else requestAnimationFrame(check);
                    };
                    check();
                })
            },
            gui: {
                setup: (w, h) => {
                    denner_canvas.width = w; denner_canvas.height = h;
                    ctx = denner_canvas.getContext('2d');
                },
                clear: (c) => { if (!ctx) return; ctx.fillStyle = c; ctx.fillRect(0, 0, denner_canvas.width, denner_canvas.height); },
                rect: (x, y, w, h, c) => new DennerObject('rect', x, y, w, h, { color: c }),
                text: (t, x, y, c) => { if (!ctx) return; ctx.fillStyle = c; ctx.font = "bold 24px 'JetBrains Mono'"; ctx.fillText(String(t), x, y); },
                get_last_key: () => {
                   const k = lastKey;
                   if (k === "Space") lastKey = "";
                   return k;
                },
                get_distance: (o1, o2) => {
                  if (!o1 || !o2) return 9999;
                  const dx = (o1.x + o1.w/2) - (o2.x + o2.w/2);
                  const dy = (o1.y + o1.h/2) - (o2.y + o2.h/2);
                  return Math.sqrt(dx * dx + dy * dy);
                },
                loop: () => new Promise(r => {
                    if (denner_should_stop) return;
                    physicsObjects.forEach(o => o.update());
                    physicsObjects.forEach(o => o.draw());
                    // Update score board in UI
                    const scoreMatch = physicsObjects.filter(o => o.type === 'dummy_score')[0];
                    requestAnimationFrame(r);
                })
            }
        };

        const denner_system_print = (val) => console.log(val);
        const denner_add = (l, r) => (typeof l === "string" || typeof r === "string") ? String(l) + String(r) : l + r;

        // Compile & Run
        window.addEventListener('DOMContentLoaded', async () => {
            const bundle = window.DennerBundle;
            if (!bundle) return;
            try {
                const code = document.getElementById('denner-code').textContent;
                const lexer = new bundle.Lexer(code);
                const parser = new bundle.Parser(lexer);
                const ast = parser.parse();
                const gen = new bundle.JSCodeGenerator(ast);
                const js = gen.generate();
                
                // Polyfill for array methods if missing in generator
                const augmented_stdlib = { ...denner_stdlib };
                
                const fn = new Function('denner', 'denner_state', 'denner_system_print', 'denner_add', 'string', '"use strict"; return (async function() {' + js + '})();');
                await fn(augmented_stdlib, {}, denner_system_print, denner_add, denner_stdlib.string);
            } catch (e) {
                console.error("Compilation/Runtime Error:", e);
            }
            lucide.createIcons();
        });
    </script>
</body>
</html>
