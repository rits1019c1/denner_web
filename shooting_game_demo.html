<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>shooting_game.den - Denner Game</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono&family=Outfit:wght@400;700&display=swap');
        body { font-family: 'Outfit', sans-serif; background-color: #050505; color: #fff; overflow: hidden; }
        .glass { background: rgba(30,30,40,0.6); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        #console { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: #10b981; }
    </style>
</head>
<body class="h-screen flex flex-col items-center justify-center p-4">
    <div class="w-full max-w-3xl flex flex-col gap-4 h-full">
        <!-- Header -->
        <div class="glass p-4 rounded-2xl flex items-center justify-between shadow-xl flex-wrap gap-2">
            <div class="flex items-center gap-3">
                <div class="bg-white p-1.5 rounded-lg">
                    <img src="logo.png" alt="Logo" class="w-5 h-5 object-contain" onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/c/ca/1x1.png'">
                </div>
                <h1 class="text-xl font-bold bg-gradient-to-r from-pink-400 to-indigo-400 bg-clip-text text-transparent">shooting_game.den</h1>
            </div>
            <div class="flex gap-2 items-center flex-wrap" id="state-badges">
                <div class="px-2 py-1 bg-white/10 rounded-md text-[10px] font-mono"><span class="text-slate-400">score:</span> <span data-denner-bind="score">0</span></div>
            </div>
            <div class="flex items-center gap-2">
                <a href="index.html" class="flex items-center gap-1.5 bg-indigo-500/10 hover:bg-indigo-500/20 text-indigo-400 px-3 py-2 rounded-xl text-sm font-medium transition-all border border-indigo-500/20">
                    <i data-lucide="code-2" class="w-4 h-4"></i> Playground
                </a>
                <a href="about.html" class="flex items-center gap-1.5 bg-pink-500/10 hover:bg-pink-500/20 text-pink-400 px-3 py-2 rounded-xl text-sm font-medium transition-all border border-pink-500/20">
                    <i data-lucide="info" class="w-4 h-4"></i> About
                </a>
                <a href="wiki.html" class="flex items-center gap-1.5 bg-slate-500/10 hover:bg-slate-500/20 text-slate-300 px-3 py-2 rounded-xl text-sm font-medium transition-all border border-slate-500/20">
                    <i data-lucide="book-open" class="w-4 h-4"></i> Wiki
                </a>
            </div>
        </div>

        <!-- Desktop Area -->
        <div class="flex-1 flex gap-4 overflow-hidden">
            <!-- Canvas -->
            <div class="flex-1 glass rounded-2xl p-2 flex items-center justify-center bg-black overflow-hidden">
                <canvas id="denner-canvas" class="max-w-full max-h-full"></canvas>
            </div>
            
        </div>
    </div>

    <script>
        const outputDiv = document.getElementById('console');
        const canvas = document.getElementById('denner-canvas');
        // ctx is declared in outer scope so gui.setup can assign it
        let ctx = null;
        let lastKey = "";

        const denner_system_print = (val) => {
            const str = (val === undefined ? "" : val.toString());
            if (outputDiv) {
                outputDiv.innerText += str + "\n";
                outputDiv.scrollTop = outputDiv.scrollHeight;
            } else {
                console.log(str);
            }
        };

        // --- Physics Engine ---
        const physicsObjects = [];

        class DennerObject {
            constructor(type, x, y, w, h, extra) {
                this.type = type;
                this.x = x; this.y = y; this.w = w; this.h = h;
                this.vx = 0; this.vy = 0;
                this.physicsEnabled = false;
                this.gravity = 0;
                this.color = extra.color || "#fff";
                this.img = extra.img || null;
                this.onCollision = null;
                physicsObjects.push(this);
            }
            enablePhysics(config) {
                config = config || {};
                this.physicsEnabled = true;
                this.gravity = (typeof config.gravity === 'number') ? config.gravity : 9.8;
                return this;
            }
            on(event, cb) {
                if (event === 'collision') this.onCollision = cb;
                return this;
            }
            update() {
                if (!this.physicsEnabled) return;
                this.vy += this.gravity * 0.016; // 60fps delta
                this.x += this.vx;
                this.y += this.vy;
                if (canvas && this.y + this.h > canvas.height) {
                    this.y = canvas.height - this.h;
                    this.vy *= -0.6;
                    if (Math.abs(this.vy) < 0.5) this.vy = 0;
                    if (this.onCollision) this.onCollision({ target: "floor" });
                }
            }
            draw() {
                if (!ctx) return;
                if (this.type === 'rect') {
                    ctx.fillStyle = this.color;
                    ctx.fillRect(this.x, this.y, this.w, this.h);
                } else if (this.type === 'image' && this.img && this.img.complete) {
                    ctx.drawImage(this.img, this.x, this.y, this.w, this.h);
                }
            }
        }

        // --- Reactivity ---
        const denner_state = new Proxy({}, {
            set(target, prop, value) {
                target[prop] = value;
                document.querySelectorAll('[data-denner-bind="' + prop + '"]').forEach(el => {
                    el.textContent = value;
                });
                return true;
            },
            get(target, prop) {
                return target[prop];
            }
        });

        // Key handling
        let gameRunning = true;
        window.addEventListener('keydown', (e) => {
            if (e.key === "Escape") {
                gameRunning = false;
                return;
            }
            const map = { "ArrowUp": "Up", "ArrowDown": "Down", "ArrowLeft": "Left", "ArrowRight": "Right", " ": "Space" };
            lastKey = map[e.key] || e.key;
        });
        window.addEventListener('keyup', () => { lastKey = ""; });

        const denner = {
            os: { name: () => "web", env: () => "" },
            path: { join: (a, b) => a + "/" + b },
            net: { get: async (url) => { const r = await fetch(url); return await r.text(); } },
            cli: {
                input: async (txt) => prompt(txt) || "",
                get_key: async () => new Promise(resolve => {
                    const check = () => {
                        if (lastKey) { const k = lastKey; lastKey = ""; resolve(k); }
                        else requestAnimationFrame(check);
                    };
                    check();
                })
            },
            gui: {
                setup: (w, h) => {
                    canvas.width = w;
                    canvas.height = h;
                    ctx = canvas.getContext('2d');
                },
                clear: (c) => { if (!ctx) return; ctx.fillStyle = c; ctx.fillRect(0, 0, canvas.width, canvas.height); physicsObjects.length = 0; },
                rect: (x, y, w, h, c) => { if (!ctx) return; ctx.fillStyle = c; ctx.fillRect(x, y, w, h); return { x, y, w, h, color: c }; },
                image: (url, x, y, w, h) => {
                    const img = new Image();
                    img.src = url;
                    return new DennerObject('image', x, y, w, h, { img });
                },
                text: (t, x, y, c) => {
                    if (!ctx) return;
                    ctx.fillStyle = c;
                    ctx.font = "18px 'JetBrains Mono', monospace";
                    ctx.fillText(t, x, y);
                },
                loop: () => new Promise(r => {
                    if (!gameRunning) { r(false); return; }
                    requestAnimationFrame(r);
                }),
                get_last_key: () => {
                    if (!gameRunning) return "Escape";
                    const k = lastKey;
                    if (k === "Space") lastKey = "";
                    return k;
                }
            }
        };

        const denner_add = (l, r) => {
            if (typeof l === "string" || typeof r === "string") return String(l) + String(r);
            return l + r;
        };

        // Run the Denner program using async Function to support await at top level
        const code = "denner.gui.setup(800, 600);\ndenner_state.score = 0;\nlet playerX = 375;\nlet playerY = 520;\nlet playerW = 50;\nlet playerH = 30;\nlet playerVX = 0;\nlet bullets = [];\nlet enemies = [];\nlet shootCooldown = 0;\nfunction spawnEnemy() {\n    let x = (Math.random() * 700);\n    enemies.push({ x: x, y: (-30), w: 30, h: 30, vy: 3, color: \"#f87171\" });\n}\n\nfunction shoot() {\n    if ((shootCooldown > 0)) return;\n    bullets.push({ x: (playerX + 18), y: (playerY - 15), w: 14, h: 20, vy: (-10), color: \"#fbbf24\" });\n    shootCooldown = 15;\n}\n\nlet spawnTimer = 0;\nwhile ((1 < 2)) {\n    denner.gui.clear(\"#0a0a0a\");\n    denner.gui.text(\"DENNER SHOOTER\", 20, 40, \"#6366f1\");\n    denner.gui.text((\"SCORE: \" + denner_state.score), 20, 70, \"#fff\");\n    denner.gui.text(\"Arrow keys: move, SPACE: shoot\", 20, 580, \"#555\");\n    denner.gui.text(\"ESC to quit\", 20, 595, \"#f87171\");\n    let k = denner.gui.get_last_key();\n    if ((k === \"Escape\")) {\n        denner.gui.clear(\"#0a0a0a\");\n        denner.gui.text(\"GAME OVER\", 300, 280, \"#f87171\");\n        denner.gui.text((\"Final Score: \" + denner_state.score), 270, 320, \"#fff\");\n        (await denner.gui.loop());\n        break;\n    }\n    if ((k === \"Left\")) {\n        playerVX = (-7);\n    } else if ((k === \"Right\")) {\n        playerVX = 7;\n    } else {\n        playerVX = 0;\n    }\n    if ((k === \"Space\")) {\n        shoot();\n    }\n    playerX = (playerX + playerVX);\n    if ((playerX < 0)) playerX = 0;\n    if ((playerX > 750)) playerX = 750;\n    denner.gui.rect(playerX, playerY, playerW, playerH, \"#4f46e5\");\n    shootCooldown = (shootCooldown - 1);\n    for (let i = 0; i < bullets.length; i++) {\n        let b = bullets[i];\n        b.y = (b.y + b.vy);\n        denner.gui.rect(b.x, b.y, b.w, b.h, b.color);\n        if ((b.y < (-20))) {\n            bullets.splice(i, 1);\n            i = (i - 1);\n        }\n    }\n    spawnTimer = (spawnTimer + 1);\n    if ((spawnTimer > 50)) {\n        spawnEnemy();\n        spawnTimer = 0;\n    }\n    for (let i = 0; i < enemies.length; i++) {\n        let e = enemies[i];\n        e.y = (e.y + e.vy);\n        denner.gui.rect(e.x, e.y, e.w, e.h, e.color);\n        if ((e.y > 600)) {\n            enemies.splice(i, 1);\n            i = (i - 1);\n        }\n        for (let j = 0; j < bullets.length; j++) {\n            let b = bullets[j];\n            if (((b.x < (e.x + 30)) && ((b.x + 14) > e.x) && (b.y < (e.y + 30)) && ((b.y + 20) > e.y))) {\n                enemies.splice(i, 1);\n                bullets.splice(j, 1);\n                i = (i - 1);\n                j = (j - 1);\n                denner_state.score = (denner_state.score + 10);\n            }\n        }\n    }\n    let cont = (await denner.gui.loop());\n    if (cont === false) break;\n}\n";
        (new Function('denner', 'denner_state', 'denner_system_print', 'denner_add', '"use strict"; return (async function() {' + code + '})();'))(
            denner, denner_state, denner_system_print, denner_add
        ).catch(e => {
            denner_system_print("Runtime Error: " + e.message);
            console.error(e);
        });
        lucide.createIcons();
    </script>
</body>
</html>
